<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Fear+ | The Ultimate Ritual</title>
    <script src="https://cdn.jsdelivr.net/npm/@webtor/embed-sdk-js/dist/index.min.js" charset="utf-8" async></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8a0303; --void: #050505; --smoke: rgba(20,20,20,0.8); }
        * { box-sizing: border-box; cursor: url('https://img.icons8.com/ios-filled/25/8a0303/dagger.png'), auto; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--void); color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* VHS Glitch & Blood Effects */
        .vhs-glitch { animation: glitch 0.15s linear infinite; opacity: 0.08; position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 5000; display: none; background: white; }
        @keyframes glitch { 0% { clip: rect(42px, 9999px, 44px, 0); } 50% { clip: rect(12px, 9999px, 56px, 0); } 100% { clip: rect(67px, 9999px, 23px, 0); } }
        .splat { position: absolute; width: 60px; height: 60px; background: radial-gradient(circle, var(--blood) 0%, transparent 70%); pointer-events: none; z-index: 9999; animation: fadeOut 0.6s forwards; }
        @keyframes fadeOut { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* Header */
        header { width: 100%; height: 75vh; background: linear-gradient(to bottom, transparent, var(--void)), url('IMG_8238.jpeg') no-repeat center center; background-size: cover; border-bottom: 3px solid var(--blood); position: relative; }
        .fear-title { position: absolute; bottom: 20px; left: 20px; font-size: clamp(50px, 10vw, 90px); font-family: 'Creepster', cursive; color: var(--blood); text-shadow: 0 0 20px black; }

        /* Sticky Search & Swipe Menu */
        .nav-bar { background: rgba(0,0,0,0.96); padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #222; }
        .search-box { flex: 1; background: #111; border: 1px solid #444; border-radius: 25px; padding: 12px 20px; color: white; outline: none; font-size: 16px; transition: 0.3s; }
        .search-box:focus { border-color: var(--blood); box-shadow: 0 0 15px var(--blood); }
        .side-menu { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: #000; z-index: 2001; transition: 0.5s; border-right: 2px solid var(--blood); overflow-y: auto; padding-top: 50px; }
        .side-menu.active { left: 0; }
        .menu-item { padding: 18px 30px; border-bottom: 1px solid #111; cursor: pointer; color: #777; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .menu-item:hover { color: var(--blood); background: #0a0000; }

        /* Grids */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        @media (min-width: 1024px) { .movie-grid { grid-template-columns: repeat(6, 1fr); padding: 40px; } }
        .card { border: 1px solid #222; transition: 0.4s; overflow: hidden; background: #000; }
        .card img { width: 100%; display: block; opacity: 0.8; transition: 0.4s; }
        .card:hover img { opacity: 1; transform: scale(1.05); }
        .card:hover { border-color: var(--blood); z-index: 10; }

        /* Immaculate Details Overlay */
        #details-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--void); z-index: 3000; display: none; overflow-y: auto; text-align: center; }
        .details-bg { position: fixed; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(70px) brightness(0.2); z-index: -1; }
        .flyer-view { width: 280px; margin: 40px auto 20px; border-radius: 15px; box-shadow: 0 0 50px var(--blood); border: 2px solid rgba(255,255,255,0.1); }
        .skull-play { width: 120px; margin: 25px auto; cursor: pointer; filter: drop-shadow(0 0 15px var(--blood)); transition: 0.4s; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #player-box { width: 100%; max-width: 1200px; margin: 20px auto; display: none; border: 3px solid var(--blood); background: #000; }
    </style>
</head>
<body onclick="drawSplat(event)">

<div class="vhs-glitch" id="vhs"></div>

<div id="side-menu" class="side-menu">
    <div class="menu-item" onclick="fetchRitual('movie', 27)">Trending Now</div>
    <div class="menu-item" onclick="fetchDecade(1920, 1969)">The Classics</div>
    <div class="menu-item" onclick="fetchDecade(1970, 1989)">The Slasher Era</div>
    <div class="menu-item" onclick="fetchDecade(1990, 2005)">The Cult Era</div>
    <div class="menu-item" onclick="fetchDecade(2006, 2026)">Modern Nightmares</div>
    <div class="menu-item" onclick="toggleMenu()">✕ CLOSE</div>
</div>

<header><div class="fear-title">FEAR+</div></header>

<div class="nav-bar">
    <div onclick="toggleMenu()" style="font-size: 30px; cursor: pointer; color: var(--blood);">☰</div>
    <input type="text" id="search" class="search-box" placeholder="Summon any horror to ever exist..." oninput="searchTheVoid()">
</div>

<main>
    <div id="resume-section" style="display:none; padding: 15px;">
        <h3 style="color:var(--blood); font-family:'Creepster'; margin-left: 10px;">RESUME RITUAL</h3>
        <div class="movie-grid" id="resume-grid"></div>
    </div>
    <h3 id="grid-label" style="padding-left: 25px; color: #444; letter-spacing: 2px; font-size: 14px;">SUMMONING...</h3>
    <div class="movie-grid" id="main-grid"></div>
</main>

<div id="details-page">
    <div class="details-bg" id="det-bg"></div>
    <div style="padding: 20px;">
        <button onclick="closeRitual()" style="background:none; border:2px solid var(--blood); color:var(--blood); padding:10px 40px; cursor:pointer; font-weight:bold; letter-spacing:1px; margin-bottom: 20px; width: 100%; max-width: 300px;">EXIT VOID</button>
        <div id="info-altar">
            <div class="flyer-view"><img src="" id="det-flyer" style="width:100%; border-radius:15px; display:block;"></div>
            <h1 id="det-title" style="font-family:'Creepster'; color:var(--blood); font-size: 4rem; margin:15px 0;"></h1>
            <p id="det-desc" style="max-width: 750px; margin: 0 auto 30px; color: #ccc; line-height: 1.8; font-size: 1.1rem; padding: 0 15px;"></p>
            <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="skull-play" onclick="igniteSacrifice()">
        </div>
        <div id="player-box"></div>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    let currentItem = null;

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
    
    function drawSplat(e) {
        const s = document.createElement('div');
        s.className = 'splat';
        s.style.left = (e.pageX - 30) + 'px';
        s.style.top = (e.pageY - 30) + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 600);
    }

    async function fetchRitual(type = 'movie', genreId = 27) {
        const res = await fetch(`https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc`);
        const data = await res.json();
        drawGrid(data.results, 'main-grid');
        document.getElementById('grid-label').innerText = "TRENDING SACRIFICES";
    }

    async function fetchDecade(start, end) {
        const vhs = document.getElementById('vhs');
        vhs.style.display = 'block';
        const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27&primary_release_date.gte=${start}-01-01&primary_release_date.lte=${end}-12-31&sort_by=popularity.desc`);
        const data = await res.json();
        drawGrid(data.results, 'main-grid');
        document.getElementById('grid-label').innerText = `ERA: ${start} - ${end}`;
        toggleMenu();
        setTimeout(() => vhs.style.display = 'none', 400);
    }

    async function searchTheVoid() {
        const q = document.getElementById('search').value;
        if(q.length < 3) { if(q.length === 0) fetchRitual(); return; }
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`);
        const data = await res.json();
        drawGrid(data.results.filter(i => i.poster_path), 'main-grid');
        document.getElementById('grid-label').innerText = "RESULTS FROM THE VOID";
    }

    function drawGrid(items, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = items.map(item => `
            <div class="card" onclick='openRitual(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                <img src="https://image.tmdb.org/p/w500${item.poster_path}">
            </div>
        `).join('');
    }

    function openRitual(item) {
        currentItem = item;
        document.getElementById('details-page').style.display = 'block';
        document.getElementById('det-title').innerText = item.title || item.name;
        document.getElementById('det-desc').innerText = item.overview;
        document.getElementById('det-flyer').src = "https://image.tmdb.org/t/p/w500" + item.poster_path;
        document.getElementById('det-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;
        
        let h = JSON.parse(localStorage.getItem('fear_history')) || [];
        h = h.filter(x => x.id !== item.id);
        h.unshift(item);
        localStorage.setItem('fear_history', JSON.stringify(h.slice(0,6)));
        renderHistory();

        document.getElementById('info-altar').style.display = 'block';
        document.getElementById('player-box').style.display = 'none';
        document.getElementById('player-box').innerHTML = '';
    }

    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('fear_history')) || [];
        if(h.length > 0) {
            document.getElementById('resume-section').style.display = 'block';
            drawGrid(h, 'resume-grid');
        }
    }

    function igniteSacrifice() {
        document.getElementById('info-altar').style.display = 'none';
        const pBox = document.getElementById('player-box');
        pBox.style.display = 'block';
        pBox.innerHTML = '<h2 style="color:var(--blood); margin-top:20%;">DECODING BROKEN BROADCAST...</h2>';

        // Automated Scraper Bridge Logic
        const magnetURI = `magnet:?xt=urn:btih:08ada5a7a6183aae1e09d831df6748d566095a10`; // Generic Bridge

        window.webtor = window.webtor || [];
        window.webtor.push({
            id: 'player-box',
            magnet: magnetURI,
            onLoaded: function(e) { e.player.play(); } // Unmute/Fullscreen handled natively
        });
    }

    function closeRitual() {
        document.getElementById('details-page').style.display = 'none';
        document.getElementById('player-box').innerHTML = '';
    }

    fetchRitual();
</script>
</body>
</html>
