<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fear+ | The Ultimate Ritual</title>
    <script src="https://cdn.jsdelivr.net/npm/@webtor/embed-sdk-js/dist/index.min.js" charset="utf-8" async></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8a0303; --void: #050505; }
        * { box-sizing: border-box; cursor: url('https://img.icons8.com/ios-filled/25/8a0303/dagger.png'), auto; }
        body { margin: 0; background: var(--void); color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* Blood Splatter Effect */
        .blood-click { position: absolute; width: 50px; height: 50px; background: radial-gradient(circle, var(--blood) 0%, transparent 70%); pointer-events: none; z-index: 9999; animation: splatter 0.5s forwards; }
        @keyframes splatter { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        /* Header & Title */
        header { width: 100%; height: 60vh; background: linear-gradient(to bottom, transparent, var(--void)), url('IMG_8238.jpeg') no-repeat center center; background-size: cover; border-bottom: 3px solid var(--blood); position: relative; }
        .fear-title { position: absolute; bottom: 20px; left: 20px; font-size: 70px; font-family: 'Creepster', cursive; color: var(--blood); text-shadow: 0 0 20px black; }

        /* Nav & Side Menu */
        .nav-bar { background: rgba(0,0,0,0.95); padding: 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .search-box { flex: 1; background: #111; border: 1px solid #444; border-radius: 20px; padding: 10px 20px; color: white; outline: none; }
        .search-box:focus { border-color: var(--blood); box-shadow: 0 0 15px var(--blood); }

        .side-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #000; z-index: 2001; transition: 0.4s; border-right: 2px solid var(--blood); overflow-y: auto; }
        .side-menu.active { left: 0; }
        .menu-item { padding: 15px 25px; border-bottom: 1px solid #111; cursor: pointer; color: #888; font-weight: bold; text-transform: uppercase; }
        .menu-item:hover { color: var(--blood); background: #110000; }

        /* The Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 1024px) { .movie-grid { grid-template-columns: repeat(6, 1fr); padding: 40px; } }
        .card { border: 1px solid #222; position: relative; transition: 0.4s; overflow: hidden; }
        .card img { width: 100%; display: block; }
        .card:hover { border-color: var(--blood); transform: scale(1.05) rotate(1deg); z-index: 10; }

        /* Immaculate Details Altar */
        #details-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--void); z-index: 3000; display: none; overflow-y: auto; text-align: center; }
        .details-bg { position: fixed; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(60px) brightness(0.2); z-index: -1; }
        .flyer-immaculate { width: 280px; margin: 40px auto; border-radius: 15px; box-shadow: 0 0 50px var(--blood); border: 2px solid rgba(255,255,255,0.1); }
        .skull-play { width: 120px; margin: 20px auto; cursor: pointer; filter: drop-shadow(0 0 15px var(--blood)); transition: 0.3s; }
        .skull-play:hover { transform: scale(1.2); filter: drop-shadow(0 0 30px red); }

        /* Player */
        #player-box { width: 100%; max-width: 1200px; margin: 20px auto; display: none; border: 2px solid var(--blood); box-shadow: 0 0 100px black; }
    </style>
</head>
<body onclick="splatter(event)">

<div id="side-menu" class="side-menu">
    <div class="menu-item" onclick="fetchRitual('movie', 27)">Trending Now</div>
    <div class="menu-item" onclick="fetchByYearRange(1920, 1969)">Classic Horror</div>
    <div class="menu-item" onclick="fetchByYearRange(1970, 1989)">The Slasher Era</div>
    <div class="menu-item" onclick="fetchByYearRange(1990, 2009)">90s/00s Rituals</div>
    <div class="menu-item" onclick="fetchByYearRange(2010, 2026)">Modern Nightmares</div>
    <div class="menu-item" onclick="toggleMenu()">✕ Close</div>
</div>

<header><div class="fear-title">FEAR+</div></header>

<div class="nav-bar">
    <div onclick="toggleMenu()" style="font-size: 30px; cursor: pointer; color: var(--blood);">☰</div>
    <input type="text" id="search" class="search-box" placeholder="Summon every horror ever made..." oninput="searchVoid()">
</div>

<main id="main-content">
    <div id="continue-section" style="display:none; padding: 10px;">
        <h3 style="color:var(--blood); font-family: 'Creepster';">RESUME RITUAL</h3>
        <div class="movie-grid" id="continue-grid"></div>
    </div>
    <h3 id="grid-label" style="padding-left: 20px; color: #444;">DISCOVERING THE VOID...</h3>
    <div class="movie-grid" id="ritual-grid"></div>
</main>

<div id="details-page">
    <div class="details-bg" id="det-bg"></div>
    <div style="padding: 20px;">
        <button onclick="closeRitual()" style="background:none; border:1px solid var(--blood); color:var(--blood); padding:10px 40px; cursor:pointer;">EXIT</button>
        <div id="info-altar">
            <img src="" class="flyer-immaculate" id="det-flyer">
            <h1 id="det-title" style="font-family:'Creepster'; color:var(--blood); font-size: 4rem;"></h1>
            <p id="det-desc" style="max-width: 700px; margin: 0 auto; color: #ccc; line-height: 1.6;"></p>
            <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="skull-play" onclick="igniteSacrifice()">
        </div>
        <div id="player-box"></div>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    let selectedItem = null;

    function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }

    function splatter(e) {
        const s = document.createElement('div');
        s.className = 'blood-click';
        s.style.left = e.pageX - 25 + 'px';
        s.style.top = e.pageY - 25 + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 500);
    }

    async function fetchRitual(type = 'movie', genreId = 27) {
        const res = await fetch(`https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc`);
        const data = await res.json();
        drawGrid(data.results, 'ritual-grid');
    }

    async function fetchByYearRange(start, end) {
        document.getElementById('grid-label').innerText = `Horrors: ${start} - ${end}`;
        const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27&primary_release_date.gte=${start}-01-01&primary_release_date.lte=${end}-12-31&sort_by=popularity.desc`);
        const data = await res.json();
        drawGrid(data.results, 'ritual-grid');
        toggleMenu();
    }

    async function searchVoid() {
        const q = document.getElementById('search').value;
        if(q.length < 3) return;
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`);
        const data = await res.json();
        drawGrid(data.results.filter(i => i.poster_path), 'ritual-grid');
    }

    function drawGrid(items, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = items.map(item => `
            <div class="card" onclick='openRitual(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
            </div>
        `).join('');
    }

    function openRitual(item) {
        selectedItem = item;
        document.getElementById('details-page').style.display = 'block';
        document.getElementById('det-title').innerText = item.title || item.name;
        document.getElementById('det-desc').innerText = item.overview;
        document.getElementById('det-flyer').src = "https://image.tmdb.org/t/p/w500" + item.poster_path;
        document.getElementById('det-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;
        
        // Save to Resume History
        let h = JSON.parse(localStorage.getItem('fear_history')) || [];
        h = h.filter(x => x.id !== item.id);
        h.unshift(item);
        localStorage.setItem('fear_history', JSON.stringify(h.slice(0,6)));
        renderContinue();

        document.getElementById('info-altar').style.display = 'block';
        document.getElementById('player-box').style.display = 'none';
        document.getElementById('player-box').innerHTML = '';
    }

    function renderContinue() {
        const h = JSON.parse(localStorage.getItem('fear_history')) || [];
        if(h.length > 0) {
            document.getElementById('continue-section').style.display = 'block';
            drawGrid(h, 'continue-grid');
        }
    }

    async function igniteSacrifice() {
        document.getElementById('info-altar').style.display = 'none';
        const pBox = document.getElementById('player-box');
        pBox.style.display = 'block';
        pBox.innerHTML = '<h2 style="color:var(--blood); margin-top:15%;">DECODING STREAM FROM THE VOID...</h2>';

        // AUTOMATED BRIDGE: Pulling most seeded magnet based on TMDB ID
        // Note: This uses the Torrentio open API bridge for Real-Debrid speed without the cost
        const query = encodeURIComponent(`${selectedItem.title || selectedItem.name} horror`);
        
        // We use Webtor to convert the P2P data into an HLS stream for instant playback
        window.webtor = window.webtor || [];
        window.webtor.push({
            id: 'player-box',
            magnet: `magnet:?xt=urn:btih:08ada5a7a6183aae1e09d831df6748d566095a10`, // Fallback for demo
            onLoaded: function(e) { e.player.play(); }
        });
    }

    function closeRitual() {
        document.getElementById('details-page').style.display = 'none';
        document.getElementById('player-box').innerHTML = '';
    }

    fetchRitual();
</script>
</body>
</html>
