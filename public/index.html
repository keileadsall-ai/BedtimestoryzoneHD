<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fear+ | The Final Ritual</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Metal+Mania&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #b30000; --void: #020202; --smoke: rgba(10, 10, 10, 0.98); }
        * { box-sizing: border-box; scrollbar-width: none; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }

        body { 
            margin: 0; background: var(--void); color: #eee; 
            font-family: 'Metal Mania', cursive; overflow-x: hidden;
            background-image: radial-gradient(circle at center, #1a0000 0%, #000 100%);
        }

        /* TV REMOTE FOCUS STYLES - CRITICAL FOR FIRESTICK */
        :focus {
            outline: 4px solid var(--blood) !important;
            outline-offset: 4px;
            transform: scale(1.1) !important;
            z-index: 9999;
            box-shadow: 0 0 40px var(--blood) !important;
        }

        /* MEDUSA LOADER */
        #loader {
            position: fixed; inset: 0; background: black; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s;
        }
        .voodoo-container {
            width: 280px; height: 280px; 
            border-radius: 50%; overflow: hidden;
            border: 3px solid var(--blood);
            box-shadow: 0 0 40px var(--blood);
        }
        .medusa-heart { 
            width: 100%; height: 100%; 
            object-fit: cover;
            animation: ritualThump 0.9s infinite; 
        }
        @keyframes ritualThump { 
            0%, 100% { transform: scale(1); filter: brightness(1); } 
            15% { transform: scale(1.1); filter: brightness(1.3); } 
            40% { transform: scale(1.05); } 
        }

        /* HEADER */
        header { 
            width: 100%; height: 60vh; 
            background: linear-gradient(to bottom, transparent, var(--void)), url('IMG_8238.jpeg') no-repeat center top; 
            background-size: cover; border-bottom: 3px solid var(--blood); position: relative;
        }
        .logo { position: absolute; bottom: 30px; left: 5%; font-family: 'Nosifer'; font-size: clamp(3rem, 15vw, 7rem); color: var(--blood); text-shadow: 0 0 30px #000; }

        /* NAVIGATION */
        .sticky-altar { position: sticky; top: 0; z-index: 1000; background: var(--smoke); backdrop-filter: blur(20px); padding: 15px; border-bottom: 1px solid #222; }
        .search-input { width: 100%; background: #000; border: 1px solid var(--blood); padding: 18px; color: var(--blood); font-family: 'Creepster'; font-size: 1.6rem; outline: none; }

        /* SIDE MENU */
        #side-menu {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: #000; border-right: 3px solid var(--blood); z-index: 2000;
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); padding: 80px 25px;
        }
        #side-menu.open { left: 0; box-shadow: 20px 0 60px #000; }
        .side-link { padding: 15px 0; color: #555; font-size: 1.8rem; cursor: pointer; border-bottom: 1px solid #111; transition: 0.3s; outline: none;}
        .side-link:hover, .side-link:focus { color: var(--blood); padding-left: 10px; }

        /* GRID */
        .horror-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 15px; }
        .card { aspect-ratio: 2/3; background: #080808; border: 1px solid #111; cursor: pointer; transition: 0.4s; overflow: hidden; outline: none; }
        .card:hover { transform: scale(1.08); border-color: var(--blood); box-shadow: 0 0 30px rgba(179,0,0,0.5); }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* CINEMA DETAILS */
        #ritual-screen {
            position: fixed; inset: 0; background: var(--void); z-index: 5000; 
            display: none; overflow-y: auto;
        }
        .hero-bg {
            width: 100%; height: 50vh; background-size: cover; background-position: center;
            position: relative; border-bottom: 2px solid var(--blood);
        }
        .hero-overlay {
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, transparent, var(--void));
        }
        .details-body {
            max-width: 1100px; margin: -100px auto 0; padding: 20px; position: relative; z-index: 10;
        }
        .meta-row { display: flex; align-items: flex-end; gap: 20px; margin-bottom: 30px; }
        .main-poster { width: 180px; border: 2px solid var(--blood); border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,1); }
        
        .play-btn {
            background: var(--blood); color: white; border: none; width: 100%; 
            padding: 20px; font-family: 'Creepster'; font-size: 2rem; 
            border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px;
            box-shadow: 0 0 20px rgba(179,0,0,0.4); margin-bottom: 30px; outline: none;
        }
        .player-mount { 
            width: 100%; aspect-ratio: 16/9; background: #000; 
            border: 1px solid #333; margin: 30px 0; display: none;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .season-row { display: flex; overflow-x: auto; gap: 10px; margin: 20px 0; padding-bottom: 10px; }
        .pill { 
            padding: 12px 25px; background: #111; border: 1px solid #333; 
            color: #888; border-radius: 8px; font-family: 'Creepster'; cursor: pointer; white-space: nowrap; outline: none;
        }
        .pill.active { border-color: var(--blood); color: var(--blood); background: #1a0000; }
    </style>
</head>
<body>

<div id="loader">
    <div class="voodoo-container">
        <img src="IMG_8259.jpeg" class="medusa-heart">
    </div>
    <h2 style="font-family:'Nosifer'; color:var(--blood); margin-top:30px; letter-spacing: 3px;">Dead Yet?</h2>
</div>

<div id="side-menu">
    <h3 style="color:var(--blood); font-family:'Nosifer';">THE VAULTS</h3>
    <div class="side-link" tabindex="0" onclick="setMode('shudder')">SHUDDER</div>
    <div class="side-link" tabindex="0" onclick="setMode('fx')">FX HORROR</div>
    <div class="side-link" tabindex="0" onclick="setMode('hulu')">HULU BLOOD</div>
    <div class="side-link" tabindex="0" onclick="setMode('hoodoo')">HOODOO FILMS</div>
    <div class="side-link" tabindex="0" onclick="setMode('70s')">70s SLASHERS</div>
    <div class="side-link" tabindex="0" onclick="setMode('unrated')">UNRATED VAULT</div>
</div>

<header><div class="logo">FEAR+</div></header>

<div class="sticky-altar">
    <input type="text" id="search" class="search-input" placeholder="SEARCH FOR A SACRIFICE..." onkeyup="handleSearch(event)">
</div>

<main>
    <section id="resume-ritual" style="display:none; padding:20px;">
        <h2 style="color:var(--blood); font-family:'Creepster'; font-size:2rem;">CONTINUE WATCHING</h2>
        <div id="continue-grid" style="display:flex; overflow-x:auto; gap:10px;"></div>
    </section>
    <div class="horror-grid" id="main-grid"></div>
    <div id="sentinel" style="height: 100px;"></div>
</main>

<div id="ritual-screen">
    <div id="hero-bg" class="hero-bg"><div class="hero-overlay"></div></div>
    <div class="details-body">
        <button id="close-btn" tabindex="0" onclick="closeRitual()" style="background:transparent; border:none; color:white; font-size:2rem; cursor:pointer; margin-bottom:20px;">←</button>
        <div class="meta-row">
            <img id="det-poster" class="main-poster">
            <div>
                <h1 id="det-title" style="font-family:'Nosifer'; color:white; font-size:2.5rem; margin:0;"></h1>
                <p id="det-meta" style="color:var(--blood); font-size:1.2rem;"></p>
            </div>
        </div>

        <button id="play-btn" tabindex="0" class="play-btn" onclick="showPlayer()">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/play--v1.png" style="width:30px;">
            PLAY NOW
        </button>

        <p id="det-desc" style="font-family:sans-serif; color:#aaa; line-height:1.6; font-size:1.1rem; margin-bottom:30px;"></p>

        <div id="tv-controls" style="display:none;">
            <h3 style="color:white; font-family:'Creepster'; font-size:1.8rem;">EPISODES</h3>
            <div id="s-row" class="season-row"></div>
            <div id="e-row" class="season-row"></div>
        </div>

        <div id="player-mount" class="player-mount"></div>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    let page = 1, mode = 'movies', fetching = false, selected = null, currentS = 1;

    let touchStart = 0;
    document.addEventListener('touchstart', e => touchStart = e.touches[0].clientX);
    document.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientX - touchStart;
        if(diff > 120) document.getElementById('side-menu').classList.add('open');
        if(diff < -120) document.getElementById('side-menu').classList.remove('open');
    });

    const obs = new IntersectionObserver(e => { if(e[0].isIntersecting && !fetching) { page++; load(); } });
    obs.observe(document.getElementById('sentinel'));

    async function load(reset = false) {
        if(reset) { page = 1; document.getElementById('main-grid').innerHTML = ''; }
        fetching = true;
        let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27&page=${page}&sort_by=popularity.desc`;
        
        if(mode === 'shudder') url = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_networks=2506&page=${page}`;
        if(mode === 'fx') url = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_networks=88&page=${page}`;
        if(mode === 'hulu') url += `&with_networks=453`;
        if(mode === 'hoodoo') url += `&with_keywords=210214|155477|12944`;
        if(mode === '70s') url += `&primary_release_date.gte=1970-01-01&primary_release_date.lte=1979-12-31&with_keywords=12336`;
        if(mode === 'unrated') url += `&certification_country=US&certification.gte=NC-17&include_adult=true`;

        const res = await fetch(url);
        const data = await res.json();
        render(data.results);
        fetching = false;
    }

    function render(items) {
        const grid = document.getElementById('main-grid');
        items.forEach(item => {
            if(!item.poster_path) return;
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('tabindex', '0'); // ALLOW REMOTE FOCUS
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${item.poster_path}">`;
            card.onclick = () => openDetails(item);
            // TRIGGER ON ENTER KEY FOR REMOTE
            card.onkeydown = (e) => { if(e.key === 'Enter') openDetails(item); };
            grid.appendChild(card);
        });
    }

    async function openDetails(item) {
        selected = item;
        document.getElementById('ritual-screen').style.display = 'block';
        document.getElementById('det-title').innerText = item.title || item.name;
        document.getElementById('det-desc').innerText = item.overview;
        document.getElementById('det-poster').src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
        document.getElementById('hero-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;
        document.getElementById('det-meta').innerText = `${item.release_date || item.first_air_date} | ${item.vote_average}/10`;
        
        const isTV = !!item.first_air_date;
        if(isTV) {
            document.getElementById('tv-controls').style.display = 'block';
            const res = await fetch(`https://api.themoviedb.org/3/tv/${item.id}?api_key=${API_KEY}`);
            const data = await res.json();
            document.getElementById('s-row').innerHTML = data.seasons.map(s => `<div class="pill" tabindex="0" onclick="syncEpisodes(${s.season_number}, this)">S${s.season_number}</div>`).join('');
            syncEpisodes(1);
        } else {
            document.getElementById('tv-controls').style.display = 'none';
        }
        saveHistory(item);
        document.getElementById('play-btn').focus(); // AUTO FOCUS PLAY BUTTON
    }

    async function syncEpisodes(sNum, el) {
        currentS = sNum;
        if(el) { document.querySelectorAll('#s-row .pill').forEach(p => p.classList.remove('active')); el.classList.add('active'); }
        const res = await fetch(`https://api.themoviedb.org/3/tv/${selected.id}/season/${sNum}?api_key=${API_KEY}`);
        const data = await res.json();
        document.getElementById('e-row').innerHTML = data.episodes.map(e => `<div class="pill" tabindex="0" onclick="ignitePlayer(${e.episode_number}, this)">E${e.episode_number}</div>`).join('');
    }

    function showPlayer() {
        document.getElementById('player-mount').style.display = 'block';
        ignitePlayer(1);
        document.getElementById('play-btn').style.display = 'none';
    }

    function ignitePlayer(eNum, el) {
        if(el) { document.querySelectorAll('#e-row .pill').forEach(p => p.classList.remove('active')); el.classList.add('active'); }
        const mount = document.getElementById('player-mount');
        mount.style.display = 'block';
        const isTV = !!selected.first_air_date;
        let url = isTV ? `https://vidsrc.cc/v2/embed/tv/${selected.id}/${currentS}/${eNum || 1}` 
                       : `https://vidsrc.cc/v2/embed/movie/${selected.id}`;
        mount.innerHTML = `<iframe id="tv-frame" src="${url}" allow="autoplay; fullscreen; encrypted-media" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>`;
        document.getElementById('tv-frame').focus();
    }

    function handleSearch(e) {
        if(e.key === 'Enter') {
            document.getElementById('main-grid').innerHTML = '';
            fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${e.target.value}`)
                .then(r => r.json()).then(d => render(d.results));
        }
    }

    function setMode(m) { mode = m; document.getElementById('side-menu').classList.remove('open'); load(true); }
    function closeRitual() { 
        document.getElementById('ritual-screen').style.display = 'none'; 
        document.getElementById('player-mount').innerHTML = ''; 
        document.getElementById('play-btn').style.display = 'flex';
    }
    
    function saveHistory(i) {
        let h = JSON.parse(localStorage.getItem('fear_history') || '[]');
        h = h.filter(x => x.id !== i.id); h.unshift(i);
        localStorage.setItem('fear_history', JSON.stringify(h.slice(0,10))); renderHistory();
    }
    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('fear_history') || '[]');
        if(h.length === 0) return;
        document.getElementById('resume-ritual').style.display = 'block';
        document.getElementById('continue-grid').innerHTML = h.map(i => `<div class="card" tabindex="0" style="min-width:100px; height:160px;" onclick='openDetails(${JSON.stringify(i)})'><img src="https://image.tmdb.org/t/p/w185${i.poster_path}"></div>`).join('');
    }

    window.onload = () => {
        load(); renderHistory();
        setTimeout(() => {
            const l = document.getElementById('loader');
            if(l) { l.style.opacity = '0'; setTimeout(() => l.style.display = 'none', 500); }
        }, 1500);
    };

    // ==========================================
    // FIRESTICK REMOTE SPATIAL NAVIGATION ENGINE
    // ==========================================
    document.addEventListener('keydown', (e) => {
        const menu = document.getElementById('side-menu');
        const active = document.activeElement;

        // 1. OPEN SIDE MENU (Firestick Remote: 'Menu' button or 'm' key)
        if (e.key === 'm' || e.key === 'ContextMenu') {
            menu.classList.toggle('open');
            if(menu.classList.contains('open')) menu.querySelector('.side-link').focus();
            return;
        }

        // 2. BACK BUTTON (Close details or menu)
        if (e.key === 'Backspace' || e.key === 'Escape') {
            if(menu.classList.contains('open')) {
                menu.classList.remove('open');
            } else {
                closeRitual();
            }
        }

        // 3. DPAD NAVIGATION
        const focusable = Array.from(document.querySelectorAll('input, .card, .side-link, .pill, button, [tabindex="0"]'))
                               .filter(el => el.offsetParent !== null); // Only visible ones

        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
            e.preventDefault();
            let next = getNearestElement(active, focusable, e.key);
            if (next) next.focus();
        }
    });

    function getNearestElement(current, targets, direction) {
        const r1 = current.getBoundingClientRect();
        let bestDist = Infinity, bestEl = null;

        targets.forEach(el => {
            if (el === current) return;
            const r2 = el.getBoundingClientRect();
            
            // Check if el is in the right direction
            const isRightDir = (direction === 'ArrowRight' && r2.left >= r1.right) ||
                               (direction === 'ArrowLeft' && r2.right <= r1.left) ||
                               (direction === 'ArrowDown' && r2.top >= r1.bottom) ||
                               (direction === 'ArrowUp' && r2.bottom <= r1.top);

            if (isRightDir) {
                const dist = Math.sqrt(Math.pow(r2.left - r1.left, 2) + Math.pow(r2.top - r1.top, 2));
                if (dist < bestDist) { bestDist = dist; bestEl = el; }
            }
        });
        return bestEl;
    }
</script>
</body>
</html>
