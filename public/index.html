<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fear+ | Horror Only</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8a0303; --void: #000000; }
        body { 
            margin: 0; background: var(--void); color: white; 
            font-family: 'Creepster', cursive; overflow-x: hidden;
        }

        /* HEADER & MENU */
        header { 
            width: 100%; height: 50vh; 
            background: linear-gradient(to bottom, transparent, var(--void)), url('IMG_8238.jpeg') no-repeat center center; 
            background-size: cover; border-bottom: 2px solid var(--blood);
        }
        .nav-container { position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--blood); }
        .nav-tabs { display: flex; overflow-x: auto; padding: 10px; gap: 15px; scrollbar-width: none; }
        .tab { padding: 8px 20px; border: 1px solid #333; color: #888; white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .tab.active { border-color: var(--blood); color: var(--blood); background: #1a0000; }
        
        /* SEARCH */
        .search-altar { padding: 15px; background: #050505; }
        .search-input { 
            width: 100%; background: #111; border: 1px solid #333; padding: 15px; 
            color: var(--blood); font-size: 1.2rem; font-family: 'Creepster'; outline: none;
        }

        /* THE GRID */
        .horror-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 10px; padding: 15px; 
        }
        .horror-card { 
            aspect-ratio: 2/3; background: #111; border: 1px solid #222; 
            overflow: hidden; transition: 0.3s; cursor: pointer;
        }
        .horror-card img { width: 100%; height: 100%; object-fit: cover; }
        .horror-card:hover { border-color: var(--blood); transform: scale(1.03); }

        /* PLAYER OVERLAY */
        #player-ritual {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--void); z-index: 5000; display: none; overflow-y: auto;
        }
        .video-vault { width: 100%; background: #000; aspect-ratio: 16/9; border-bottom: 2px solid var(--blood); }
        iframe { width: 100%; height: 100%; border: none; }

        /* LOADER */
        #loading-skull {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .pulse { width: 80px; animation: heartbeat 0.8s infinite; filter: drop-shadow(0 0 10px var(--blood)); }
        @keyframes heartbeat { 0% {transform: scale(0.9);} 10% {transform: scale(1.1);} 100% {transform: scale(0.9);} }
    </style>
</head>
<body>

<div id="loading-skull">
    <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="pulse">
    <h2 style="color:var(--blood); margin-top:20px;">SUMMONING THE BLOOD...</h2>
</div>

<header><h1 style="position:absolute; bottom:20px; left:20px; font-family:'Nosifer'; color:var(--blood); font-size:3rem;">FEAR+</h1></header>

<div class="nav-container">
    <div class="search-altar">
        <input type="text" id="search" class="search-input" placeholder="SEARCH THE GRAVEYARD..." onkeyup="handleSearch(event)">
    </div>
    <div class="nav-tabs">
        <div class="tab active" onclick="setCategory('trending')">TRENDING HORROR</div>
        <div class="tab" onclick="setCategory('slasher')">SLASHERS</div>
        <div class="tab" onclick="setCategory('paranormal')">PARANORMAL</div>
        <div class="tab" onclick="setCategory('extreme')">UNRATED/EXTREME</div>
        <div class="tab" onclick="setCategory('tv')">HORROR SERIES</div>
    </div>
</div>

<main>
    <div id="continue-section" style="display:none; padding: 10px;">
        <h3 style="color:var(--blood);">CONTINUE SACRIFICE</h3>
        <div class="horror-grid" id="continue-grid"></div>
    </div>
    <div class="horror-grid" id="main-grid"></div>
    <div id="sentinel" style="height: 100px;"></div>
</main>

<div id="player-ritual">
    <div class="video-vault" id="mount"></div>
    <div style="padding: 20px;">
        <button onclick="closeRitual()" style="background:var(--blood); color:white; border:none; padding:10px 30px; cursor:pointer; font-family:'Creepster';">← EXIT</button>
        <h1 id="p-title" style="color:var(--blood); font-family:'Nosifer'; margin: 20px 0;"></h1>
        <div id="tv-controls" style="display:none; margin: 20px 0; gap: 10px;">
            <select id="s-sel" style="padding:10px; background:#111; color:var(--blood); border:1px solid var(--blood);"></select>
            <select id="e-sel" style="padding:10px; background:#111; color:var(--blood); border:1px solid var(--blood);"></select>
            <button onclick="igniteTV()" style="padding:10px 20px; background:var(--blood); color:white; border:none;">PLAY</button>
        </div>
        <p id="p-desc" style="color:#888; font-family: sans-serif; line-height:1.6;"></p>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    let currentPage = 1;
    let currentMode = 'trending';
    let isFetching = false;
    let selectedItem = null;

    // INFINITE SCROLL
    const obs = new IntersectionObserver(e => {
        if(e[0].isIntersecting && !isFetching) { currentPage++; loadHorror(); }
    });
    obs.observe(document.getElementById('sentinel'));

    async function loadHorror(reset = false) {
        if(reset) { currentPage = 1; document.getElementById('main-grid').innerHTML = ''; }
        isFetching = true;
        
        let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27&page=${currentPage}&sort_by=popularity.desc`;
        
        if(currentMode === 'tv') url = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_genres=27&page=${currentPage}`;
        if(currentMode === 'extreme') url += `&certification_country=US&certification.lte=R&include_adult=true`;
        
        const res = await fetch(url);
        const data = await res.json();
        draw(data.results);
        isFetching = false;
    }

    function draw(items) {
        const grid = document.getElementById('main-grid');
        items.forEach(item => {
            if(!item.poster_path) return;
            const card = document.createElement('div');
            card.className = 'horror-card';
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${item.poster_path}">`;
            card.onclick = () => openRitual(item);
            grid.appendChild(card);
        });
    }

    async function openRitual(item) {
        selectedItem = item;
        document.getElementById('player-ritual').style.display = 'block';
        document.getElementById('p-title').innerText = item.title || item.name;
        document.getElementById('p-desc').innerText = item.overview;
        
        const isTV = !!item.first_air_date;
        const mount = document.getElementById('mount');
        
        if(isTV) {
            document.getElementById('tv-controls').style.display = 'flex';
            const sRes = await fetch(`https://api.themoviedb.org/3/tv/${item.id}?api_key=${API_KEY}`);
            const sData = await sRes.json();
            document.getElementById('s-sel').innerHTML = sData.seasons.map(s => `<option value="${s.season_number}">${s.name}</option>`).join('');
            mount.innerHTML = `<h2 style="text-align:center; padding-top:100px;">SELECT SEASON & EPISODE BELOW</h2>`;
        } else {
            document.getElementById('tv-controls').style.display = 'none';
            // PURE DIRECT RESOLVER
            mount.innerHTML = `<iframe src="https://vidsrc.me/embed/movie?tmdb=${item.id}" allowfullscreen allow="autoplay"></iframe>`;
        }
    }

    function igniteTV() {
        const s = document.getElementById('s-sel').value;
        const e = document.getElementById('e-sel').value || 1;
        document.getElementById('mount').innerHTML = `<iframe src="https://vidsrc.me/embed/tv?tmdb=${selectedItem.id}&sea=${s}&epi=${e}" allowfullscreen allow="autoplay"></iframe>`;
    }

    function handleSearch(e) {
        if(e.key === 'Enter') {
            currentMode = 'search';
            document.getElementById('main-grid').innerHTML = '';
            search(e.target.value);
        }
    }

    async function search(q) {
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`);
        const data = await res.json();
        // FILTER TO ONLY HORROR GENRE (27)
        const horrorOnly = data.results.filter(i => i.genre_ids && i.genre_ids.includes(27));
        draw(horrorOnly);
    }

    function setCategory(cat) {
        currentMode = cat;
        loadHorror(true);
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
    }

    function closeRitual() {
        document.getElementById('player-ritual').style.display = 'none';
        document.getElementById('mount').innerHTML = '';
    }

    window.onload = () => {
        loadHorror();
        setTimeout(() => document.getElementById('loading-skull').style.display = 'none', 2000);
    };
</script>
</body>
</html>
