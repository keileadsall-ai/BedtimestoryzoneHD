<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fear+ | The Actual Ritual</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8a0303; --void: #050505; --smoke: rgba(20, 20, 20, 0.9); }
        * { box-sizing: border-box; cursor: url('https://img.icons8.com/ios-filled/25/8a0303/dagger.png'), auto; }
        
        body { 
            margin: 0; background: var(--void); color: white; 
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden; 
        }

        /* SMOKY OVERLAY */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.3; pointer-events: none; z-index: 10;
        }

        /* PULSING SKULL LOADER */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; 
        }
        .skull-pulse { 
            width: 120px; filter: drop-shadow(0 0 20px var(--blood)); 
            animation: heartThump 0.8s infinite; 
        }
        @keyframes heartThump { 
            0% { transform: scale(1); } 15% { transform: scale(1.25); } 
            30% { transform: scale(1); } 45% { transform: scale(1.15); } 100% { transform: scale(1); } 
        }

        /* HEADER BANNER */
        header { 
            width: 100%; height: 75vh; 
            background: linear-gradient(to bottom, transparent, var(--void)), url('IMG_8238.jpeg') no-repeat center top; 
            background-size: cover; position: relative; border-bottom: 4px solid var(--blood);
        }
        .fear-title { 
            position: absolute; bottom: 40px; left: 40px; 
            font-size: 120px; font-family: 'Nosifer'; color: var(--blood); 
            text-shadow: 10px 10px 30px black; letter-spacing: -5px;
        }

        /* HORIZONTAL GENRE NAV */
        .genre-nav {
            display: flex; overflow-x: auto; padding: 20px; gap: 20px;
            background: rgba(0,0,0,0.8); sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #222; scrollbar-width: none;
        }
        .genre-pill {
            white-space: nowrap; padding: 10px 25px; border: 1px solid var(--blood);
            border-radius: 50px; font-family: 'Creepster'; font-size: 1.2rem;
            transition: 0.3s; color: #ccc;
        }
        .genre-pill:hover { background: var(--blood); color: white; transform: translateY(-3px); }

        /* GRID */
        .movie-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; padding: 20px; 
        }
        .card { 
            background: #111; border: 1px solid #222; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; overflow: hidden; border-radius: 5px;
        }
        .card img { width: 100%; transition: 0.5s; }
        .card:hover { border-color: var(--blood); transform: scale(1.08); z-index: 50; box-shadow: 0 0 25px var(--blood); }

        /* TV SELECTOR UI */
        .selector-altar {
            display: flex; justify-content: center; gap: 15px; margin: 20px 0;
            flex-wrap: wrap;
        }
        select {
            background: #111; color: var(--blood); border: 1px solid var(--blood);
            padding: 10px; font-family: 'Creepster'; font-size: 1.1rem; outline: none;
        }

        #details-page { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--void); z-index: 3000; display: none; overflow-y: auto; 
        }
        iframe { width: 100%; height: 80vh; border: none; background: #000; }
        
        #sentinel { height: 100px; width: 100%; }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="skull-pulse">
    <h2 style="color:var(--blood); font-family: 'Creepster'; margin-top:20px; letter-spacing: 5px;">BLEEDING OUT DATA...</h2>
</div>

<header><div class="fear-title">FEAR+</div></header>

<div class="genre-nav" id="top-nav">
    <div class="genre-pill" onclick="changeRitual('movie', 27)">All Movies</div>
    <div class="genre-pill" onclick="changeRitual('tv', 10765)">Sci-Fi Horror</div>
    <div class="genre-pill" onclick="changeRitual('movie', 53)">Thrillers</div>
    <div class="genre-pill" onclick="changeRitual('movie', 9648)">Mystery</div>
</div>

<main>
    <div id="continue-section" style="display:none; padding: 20px;">
        <h2 style="color:var(--blood); font-family:'Creepster';">RESUME SUFFERING</h2>
        <div class="movie-grid" id="continue-grid"></div>
    </div>
    
    <h2 style="padding-left: 20px; color:var(--blood); font-family:'Creepster';" id="grid-title">TRENDING SACRIFICES</h2>
    <div class="movie-grid" id="ritual-grid"></div>
    <div id="sentinel"></div> </main>

<div id="details-page">
    <div style="padding: 20px;">
        <button onclick="closeRitual()" style="background:var(--blood); color:white; border:none; padding:10px 30px; font-family:'Creepster'; cursor:pointer;">← BACK TO THE VOID</button>
        <div id="altar-content">
            <h1 id="det-title" style="font-family:'Nosifer'; color:var(--blood); text-align:center; font-size:3rem;"></h1>
            
            <div id="tv-controls" class="selector-altar" style="display:none;">
                <select id="season-select" onchange="updateEpisodes()"></select>
                <select id="episode-select"></select>
                <button onclick="igniteSacrifice()" style="background:var(--blood); border:none; color:white; padding:10px 20px; font-family:'Creepster';">SUMMON EPISODE</button>
            </div>

            <div id="player-container"></div>
            <p id="det-desc" style="max-width:800px; margin: 30px auto; color:#888; text-align:center; line-height:1.8;"></p>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
    let currentPage = 1;
    let currentGenre = 27;
    let currentType = 'movie';
    let selectedItem = null;

    // INFINITE SCROLL LOGIC
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            currentPage++;
            fetchRitual(currentType, currentGenre, true);
        }
    }, { threshold: 1.0 });

    observer.observe(document.getElementById('sentinel'));

    async function changeRitual(type, genre) {
        currentType = type;
        currentGenre = genre;
        currentPage = 1;
        document.getElementById('ritual-grid').innerHTML = '';
        await fetchRitual(type, genre);
    }

    async function fetchRitual(type, genreId, append = false) {
        const url = `https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&with_genres=${genreId}&page=${currentPage}&sort_by=popularity.desc`;
        const res = await fetch(url);
        const data = await res.json();
        drawGrid(data.results, append);
    }

    function drawGrid(items, append) {
        const grid = document.getElementById('ritual-grid');
        const html = items.map(item => `
            <div class="card" onclick='openRitual(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                <img src="${item.poster_path ? IMG_BASE + item.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}">
            </div>
        `).join('');
        
        if (append) grid.innerHTML += html;
        else grid.innerHTML = html;
    }

    async function openRitual(item) {
        selectedItem = item;
        document.getElementById('details-page').style.display = 'block';
        document.getElementById('det-title').innerText = item.title || item.name;
        document.getElementById('det-desc').innerText = item.overview;
        
        const isTV = !!item.first_air_date;
        const tvControls = document.getElementById('tv-controls');
        
        if (isTV) {
            tvControls.style.display = 'flex';
            await loadSeasons(item.id);
        } else {
            tvControls.style.display = 'none';
            igniteSacrifice();
        }
    }

    async function loadSeasons(id) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}`);
        const data = await res.json();
        const sSelect = document.getElementById('season-select');
        sSelect.innerHTML = data.seasons.map(s => `<option value="${s.season_number}">${s.name}</option>`).join('');
        updateEpisodes();
    }

    async function updateEpisodes() {
        const sNum = document.getElementById('season-select').value;
        const res = await fetch(`https://api.themoviedb.org/3/tv/${selectedItem.id}/season/${sNum}?api_key=${API_KEY}`);
        const data = await res.json();
        const eSelect = document.getElementById('episode-select');
        eSelect.innerHTML = data.episodes.map(e => `<option value="${e.episode_number}">Ep ${e.episode_number}: ${e.name}</option>`).join('');
    }

    function igniteSacrifice() {
        const pContainer = document.getElementById('player-container');
        const isTV = !!selectedItem.first_air_date;
        let url = "";

        if (isTV) {
            const s = document.getElementById('season-select').value;
            const e = document.getElementById('episode-select').value;
            url = `https://vidsrc.to/embed/tv/${selectedItem.id}/${s}/${e}`;
        } else {
            url = `https://vidsrc.to/embed/movie/${selectedItem.id}`;
        }

        pContainer.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
    }

    function closeRitual() {
        document.getElementById('details-page').style.display = 'none';
        document.getElementById('player-container').innerHTML = '';
    }

    // Initialize
    window.onload = () => {
        fetchRitual('movie', 27);
        setTimeout(() => document.getElementById('loader').style.fadeOut = 'slow', 2000);
        setTimeout(() => document.getElementById('loader').style.display = 'none', 2500);
    };
</script>
</body>
</html>
