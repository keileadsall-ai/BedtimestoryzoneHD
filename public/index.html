<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fear+ | The Forbidden Ritual</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Metal+Mania&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #b30000; --void: #020202; --smoke: rgba(10, 10, 10, 0.98); }
        * { box-sizing: border-box; scrollbar-width: none; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }

        body { 
            margin: 0; background: var(--void); color: #eee; 
            font-family: 'Metal Mania', cursive; overflow-x: hidden;
            background-image: radial-gradient(circle at center, #1a0000 0%, #000 100%);
        }

        /* LOADER FIX: Ensures it goes away no matter what */
        #loader {
            position: fixed; inset: 0; background: black; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
        .skull { width: 150px; filter: drop-shadow(0 0 25px var(--blood)); animation: heartThump 0.9s infinite; }
        @keyframes heartThump { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.3); } 40% { transform: scale(1.1); } }

        /* HEADER BANNER */
        header { 
            width: 100%; height: 65vh; 
            background: linear-gradient(to bottom, transparent, var(--void)), url('IMG_8238.jpeg') no-repeat center top; 
            background-size: cover; border-bottom: 3px solid var(--blood); position: relative;
        }
        .logo { position: absolute; bottom: 40px; left: 5%; font-family: 'Nosifer'; font-size: clamp(4rem, 15vw, 8rem); color: var(--blood); text-shadow: 0 0 30px #000, 0 0 10px var(--blood); }

        /* SEARCH & SIDE MENU */
        .sticky-altar { position: sticky; top: 0; z-index: 1000; background: var(--smoke); backdrop-filter: blur(25px); padding: 15px; border-bottom: 1px solid #222; }
        .search-input { width: 100%; background: #000; border: 1px solid var(--blood); padding: 20px; color: var(--blood); font-family: 'Creepster'; font-size: 1.8rem; outline: none; box-shadow: inset 0 0 15px rgba(179,0,0,0.2); }

        #side-menu {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: #000; border-right: 3px solid var(--blood); z-index: 2000;
            transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); padding: 100px 30px;
        }
        #side-menu.open { left: 0; box-shadow: 25px 0 70px #000; }
        .side-link { padding: 20px 0; color: #444; font-size: 2rem; cursor: pointer; border-bottom: 1px solid #111; transition: 0.3s; }
        .side-link:hover { color: var(--blood); transform: translateX(12px); text-shadow: 0 0 10px var(--blood); }

        /* GRID: High Density */
        .horror-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 20px; }
        .card { aspect-ratio: 2/3; background: #080808; border: 1px solid #111; cursor: pointer; transition: 0.4s; overflow: hidden; position: relative; }
        .card:hover { transform: scale(1.1); border-color: var(--blood); z-index: 10; box-shadow: 0 0 40px rgba(179,0,0,0.6); }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* COHESIVE RITUAL DETAILS */
        #ritual-screen {
            position: fixed; inset: 0; background: rgba(2,2,2,0.99); z-index: 5000; 
            display: none; overflow-y: auto; padding: 20px;
        }
        .cinema-ritual { max-width: 1300px; margin: auto; display: flex; flex-direction: column; gap: 30px; }
        .details-hero { display: flex; flex-wrap: wrap; gap: 40px; align-items: start; background: rgba(15,15,15,0.8); padding: 30px; border: 1px solid #222; border-radius: 4px; }
        .poster-ritual { width: 320px; border: 3px solid var(--blood); box-shadow: 0 0 50px rgba(0,0,0,1); }
        .text-ritual { flex: 1; min-width: 320px; }
        
        .player-tomb { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid var(--blood); position: relative; box-shadow: 0 0 60px #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-blood { background: var(--blood); color: #fff; border: none; padding: 18px 45px; font-family: 'Creepster'; font-size: 1.8rem; cursor: pointer; transition: 0.3s; }
        .btn-blood:hover { background: #ff0000; box-shadow: 0 0 30px var(--blood); transform: scale(1.05); }
        select { background: #000; color: var(--blood); border: 1px solid var(--blood); padding: 15px; font-family: 'Creepster'; font-size: 1.4rem; }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://img.icons8.com/ios-filled/200/b30000/skull.png" class="skull">
    <h2 style="font-family:'Nosifer'; color:var(--blood); margin-top:30px; letter-spacing: 3px;">BREACHING THE VOID...</h2>
</div>

<div id="side-menu">
    <h2 style="color:var(--blood); font-family:'Nosifer'; font-size: 2rem; margin-bottom: 40px;">THE ARCHIVES</h2>
    <div class="side-link" onclick="setMode('shudder')">SHUDDER</div>
    <div class="side-link" onclick="setMode('hulu')">HULU BLOOD</div>
    <div class="side-link" onclick="setMode('hoodoo')">HOODOO VAULT</div>
    <div class="side-link" onclick="setMode('70s')">70s SLASHERS</div>
    <div class="side-link" onclick="setMode('unrated')">UNRATED/X</div>
</div>

<header><div class="logo">FEAR+</div></header>

<div class="sticky-altar">
    <input type="text" id="search" class="search-input" placeholder="SUMMON A NIGHTMARE..." onkeyup="handleSearch(event)">
</div>

<main>
    <section id="resume-ritual" style="display:none; padding:30px;">
        <h2 style="color:var(--blood); font-family:'Creepster'; font-size:2.5rem;">CONTINUE RITUAL</h2>
        <div id="continue-grid" style="display:flex; overflow-x:auto; gap:15px; padding-bottom:15px;"></div>
    </section>
    <div class="horror-grid" id="main-grid"></div>
    <div id="sentinel" style="height: 150px;"></div>
</main>

<div id="ritual-screen">
    <div class="cinema-ritual">
        <button class="btn-blood" onclick="closeRitual()">← ESCAPE</button>
        <div class="details-hero">
            <img id="det-poster" class="poster-ritual">
            <div class="text-ritual">
                <h1 id="det-title" style="font-family:'Nosifer'; color:var(--blood'; font-size:4rem; margin:0;"></h1>
                <p id="det-meta" style="color:#666; font-size:1.5rem; margin: 15px 0;"></p>
                <p id="det-desc" style="font-family:sans-serif; color:#bbb; line-height:1.8; font-size: 1.2rem;"></p>
                <div id="tv-ctrls" style="display:none; margin:30px 0;">
                    <select id="s-sel" onchange="syncEpisodes()"></select>
                    <select id="e-sel"></select>
                    <button class="btn-blood" style="padding:10px 25px; font-size:1.2rem;" onclick="ignitePlayer()">PLAY CHAPTER</button>
                </div>
            </div>
        </div>
        <div class="player-tomb" id="player-mount"></div>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    let page = 1, mode = 'movies', fetching = false, selected = null;

    // Swipe Side Menu Logic
    let startX = 0;
    document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientX - startX;
        if(diff > 120) document.getElementById('side-menu').classList.add('open');
        if(diff < -120) document.getElementById('side-menu').classList.remove('open');
    });

    // Infinite Scroll
    const obs = new IntersectionObserver(e => { if(e[0].isIntersecting && !fetching) { page++; load(); } });
    obs.observe(document.getElementById('sentinel'));

    async function load(reset = false) {
        if(reset) { page = 1; document.getElementById('main-grid').innerHTML = ''; }
        fetching = true;
        let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27&page=${page}&sort_by=popularity.desc`;
        
        if(mode === 'shudder') url = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_networks=2506&page=${page}`;
        if(mode === 'hulu') url += `&with_networks=453`;
        if(mode === 'hoodoo') url += `&with_keywords=210214|155477|12944`;
        if(mode === '70s') url += `&primary_release_date.gte=1970-01-01&primary_release_date.lte=1979-12-31&with_keywords=12336`;
        if(mode === 'unrated') url += `&certification_country=US&certification.gte=NC-17&include_adult=true`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            render(data.results);
        } catch (e) { console.error(e); }
        fetching = false;
    }

    function render(items) {
        const grid = document.getElementById('main-grid');
        items.forEach(item => {
            if(!item.poster_path) return;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="https://image.tmdb.org/t/p/w342${item.poster_path}" loading="lazy">`;
            card.onclick = () => openDetails(item);
            grid.appendChild(card);
        });
    }

    async function openDetails(item) {
        selected = item;
        document.getElementById('ritual-screen').style.display = 'block';
        document.getElementById('det-title').innerText = item.title || item.name;
        document.getElementById('det-desc').innerText = item.overview;
        document.getElementById('det-poster').src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
        document.getElementById('det-meta').innerText = `SACRIFICED: ${item.release_date || item.first_air_date} | RATING: ${item.vote_average}/10`;
        
        const isTV = !!item.first_air_date;
        if(isTV) {
            document.getElementById('tv-ctrls').style.display = 'block';
            const res = await fetch(`https://api.themoviedb.org/3/tv/${item.id}?api_key=${API_KEY}`);
            const data = await res.json();
            document.getElementById('s-sel').innerHTML = data.seasons.map(s => `<option value="${s.season_number}">${s.name}</option>`).join('');
            syncEpisodes();
        } else {
            document.getElementById('tv-ctrls').style.display = 'none';
            ignitePlayer();
        }
        saveHistory(item);
    }

    async function syncEpisodes() {
        const s = document.getElementById('s-sel').value;
        const res = await fetch(`https://api.themoviedb.org/3/tv/${selected.id}/season/${s}?api_key=${API_KEY}`);
        const data = await res.json();
        document.getElementById('e-sel').innerHTML = data.episodes.map(e => `<option value="${e.episode_number}">EP ${e.episode_number}: ${e.name}</option>`).join('');
    }

    function ignitePlayer() {
        const mount = document.getElementById('player-mount');
        const isTV = !!selected.first_air_date;
        const s = document.getElementById('s-sel').value || 1;
        const e = document.getElementById('e-sel').value || 1;
        
        // HACKER FIX: Mirror Rotation. If one fails, the other triggers on next click.
        let mirrors = [
            `https://vidsrc.to/embed/${isTV ? 'tv' : 'movie'}/${selected.id}${isTV ? '/'+s+'/'+e : ''}`,
            `https://vidsrc.me/embed/${isTV ? 'tv' : 'movie'}?tmdb=${selected.id}${isTV ? '&season='+s+'&episode='+e : ''}`
        ];
        
        let activeUrl = mirrors[Math.floor(Math.random() * mirrors.length)];
        mount.innerHTML = `<iframe src="${activeUrl}" allow="autoplay; fullscreen; encrypted-media" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>`;
    }

    function handleSearch(e) {
        if(e.key === 'Enter') {
            document.getElementById('main-grid').innerHTML = '';
            fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${e.target.value}`)
                .then(r => r.json()).then(d => render(d.results));
        }
    }

    function setMode(m) { mode = m; document.getElementById('side-menu').classList.remove('open'); load(true); }
    function closeRitual() { document.getElementById('ritual-screen').style.display = 'none'; document.getElementById('player-mount').innerHTML = ''; }
    
    function saveHistory(i) {
        let h = JSON.parse(localStorage.getItem('fear_history') || '[]');
        h = h.filter(x => x.id !== i.id); h.unshift(i);
        localStorage.setItem('fear_history', JSON.stringify(h.slice(0,12))); renderHistory();
    }
    function renderHistory() {
        const h = JSON.parse(localStorage.getItem('fear_history') || '[]');
        if(h.length === 0) return;
        document.getElementById('resume-ritual').style.display = 'block';
        document.getElementById('continue-grid').innerHTML = h.map(i => `<div class="card" style="min-width:110px; height:160px;" onclick='openDetails(${JSON.stringify(i)})'><img src="https://image.tmdb.org/t/p/w185${i.poster_path}"></div>`).join('');
    }

    // ULTIMATE LOADER FIX
    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('loader');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);
            }
        }, 2000);
    });
</script>
</body>
</html>
