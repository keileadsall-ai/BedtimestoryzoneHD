<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fear+ | The Ritual</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8a0303; --void: #050505; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--void); color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        .skull-pulse { width: 80px; filter: invert(1) sepia(1) saturate(10000%) hue-rotate(0deg); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Banner */
        header {
            width: 100%; height: 70vh;
            background: linear-gradient(to bottom, transparent, var(--void)), url('IMG_8238.jpeg') no-repeat center center;
            background-size: cover; position: relative; border-bottom: 3px solid var(--blood);
        }
        .fear-title {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 60px; font-family: 'Creepster', cursive; color: var(--blood);
        }

        /* Nav */
        nav {
            background: rgba(0,0,0,0.9); padding: 15px; display: flex; 
            overflow-x: auto; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222;
        }
        .genre { margin-right: 20px; color: #888; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        /* Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 1024px) { .movie-grid { grid-template-columns: repeat(6, 1fr); } }
        .card { border: 1px solid #222; overflow: hidden; }
        .card img { width: 100%; display: block; }

        /* IMMACULATE DETAILS PAGE */
        #details-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--void); z-index: 2000; display: none; overflow-y: auto;
        }
        .details-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.2); z-index: -1;
        }
        .altar { padding: 20px; text-align: center; }
        .flyer-sexier {
            width: 250px; margin: 20px auto; border-radius: 10px;
            box-shadow: 0 0 30px var(--blood); border: 1px solid rgba(255,255,255,0.1);
        }
        .flyer-sexier img { width: 100%; display: block; }

        /* Skull Play Button */
        .skull-play {
            width: 120px; margin: 30px auto; cursor: pointer;
            filter: drop-shadow(0 0 10px var(--blood)); transition: 0.3s;
        }
        .skull-play:hover { transform: scale(1.1); filter: drop-shadow(0 0 20px red); }

        /* Player */
        #player-box { width: 100%; aspect-ratio: 16/9; background: #000; display: none; border: 2px solid var(--blood); }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="skull-pulse">
    <h2 style="color:var(--blood); font-family: 'Creepster';">SUMMONING...</h2>
</div>

<header><div class="fear-title">FEAR+</div></header>

<nav id="top-nav"></nav>

<main id="main-content">
    <div class="movie-grid" id="ritual-grid"></div>
</main>

<div id="details-page">
    <div class="details-bg" id="det-bg"></div>
    <div class="altar">
        <button onclick="closeRitual()" style="background:none; border:1px solid red; color:white; padding:10px; width:100%; margin-bottom:20px;">✕ CLOSE</button>
        
        <div class="flyer-sexier">
            <img src="" id="det-flyer">
        </div>

        <h1 id="det-title" style="font-family:'Creepster'; color:var(--blood); font-size: 3rem;"></h1>
        <p id="det-desc" style="color:#ccc; font-size: 1.1rem; max-width: 600px; margin: 0 auto;"></p>

        <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="skull-play" onclick="startSacrifice()">

        <div id="player-box"></div>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    const client = new WebTorrent();
    let selectedHorror = null;

    // 1. Initial Load
    window.onload = () => {
        fetchHorrors();
        setTimeout(() => document.getElementById('loader').style.display='none', 2000);
    };

    async function fetchHorrors() {
        const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27&sort_by=popularity.desc`);
        const data = await res.json();
        const grid = document.getElementById('ritual-grid');
        grid.innerHTML = data.results.map(movie => `
            <div class="card" onclick='openDetails(${JSON.stringify(movie).replace(/'/g, "&apos;")})'>
                <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
            </div>
        `).join('');
    }

    function openDetails(movie) {
        selectedHorror = movie;
        document.getElementById('details-page').style.display = 'block';
        document.getElementById('det-title').innerText = movie.title;
        document.getElementById('det-desc').innerText = movie.overview;
        document.getElementById('det-flyer').src = "https://image.tmdb.org/t/p/w500" + movie.poster_path;
        document.getElementById('det-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
        
        // Reset view
        document.getElementById('player-box').style.display = 'none';
        document.getElementById('player-box').innerHTML = '';
    }

    function startSacrifice() {
        const pBox = document.getElementById('player-box');
        pBox.style.display = 'block';
        pBox.innerHTML = '<h2 style="color:red; margin-top:20%;">LOCATING HOST...</h2>';
        
        // NOTE: You need a real Magnet URI here. 
        // For testing, this uses a legal open-source Big Buck Bunny torrent.
        const magnetURI = 'magnet:?xt=urn:btih:dd8255ecdc7ca55fb0bbf81323d87062db1f6d1c&dn=Big+Buck+Bunny&tr=udp%3A%2F%2Fexplodie.org%3A6969';

        client.add(magnetURI, (torrent) => {
            const file = torrent.files.find(f => f.name.endsWith('.mp4'));
            pBox.innerHTML = '';
            file.appendTo('#player-box', { autoplay: true, muted: false });
            
            // Auto-Fullscreen
            const v = pBox.querySelector('video');
            v.onplay = () => v.requestFullscreen();
        });
    }

    function closeRitual() {
        document.getElementById('details-page').style.display = 'none';
        client.torrents.forEach(t => t.destroy());
    }
</script>
</body>
</html>
