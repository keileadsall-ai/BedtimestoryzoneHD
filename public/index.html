<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fear+ | The Ritual</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8a0303; --void: #050505; }
        body { margin: 0; background: var(--void); color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* Immaculate Details Overlay */
        #details-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--void); z-index: 500; display: none; overflow-y: auto;
        }

        /* Sexy Background Blur */
        .details-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(40px) brightness(0.3); z-index: -1;
        }

        .altar { padding: 20px; max-width: 1000px; margin: auto; text-align: center; }

        /* The Sexy Flyer View */
        .flyer-container {
            width: 280px; margin: 20px auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px var(--blood);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden;
        }
        .flyer-container img { width: 100%; display: block; }

        /* Skull Play Button */
        .skull-play {
            width: 100px; cursor: pointer; transition: 0.3s;
            filter: drop-shadow(0 0 10px var(--blood));
            margin: 20px auto; display: block;
        }
        .skull-play:hover { transform: scale(1.1) rotate(5deg); filter: drop-shadow(0 0 20px red); }

        #player-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--blood); display: none; margin-top: 20px; }
        video { width: 100%; height: 100%; outline: none; }

        /* UI elements */
        .meta-data h1 { font-family: 'Creepster'; font-size: 3rem; color: var(--blood); margin: 10px 0; }
        .meta-data p { color: #ccc; line-height: 1.6; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="details-page">
    <div class="details-bg" id="det-bg"></div>
    <div class="altar">
        <button onclick="closeRitual()" style="background:none; border:1px solid red; color:white; padding:10px; cursor:pointer; width:100%; margin-bottom:20px;">✕ LEAVE THE VOID</button>
        
        <div class="flyer-container" id="flyer-view">
            <img src="" id="det-flyer">
        </div>

        <div class="meta-data">
            <h1 id="det-title"></h1>
            <p id="det-desc"></p>
        </div>

        <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="skull-play" id="play-btn" onclick="startStream()">

        <div id="player-box"></div>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    const client = new WebTorrent();
    let currentItem = null;

    function openRitual(item) {
        currentItem = item;
        document.getElementById('details-page').style.display = 'block';
        document.getElementById('det-title').innerText = item.title || item.name;
        document.getElementById('det-desc').innerText = item.overview;
        document.getElementById('det-flyer').src = "https://image.tmdb.org/t/p/w500" + item.poster_path;
        document.getElementById('det-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;
        
        // Reset View
        document.getElementById('player-box').style.display = 'none';
        document.getElementById('play-btn').style.display = 'block';
        document.getElementById('flyer-view').style.display = 'block';
    }

    async function startStream() {
        const title = currentItem.title || currentItem.name;
        document.getElementById('play-btn').style.display = 'none';
        document.getElementById('flyer-view').style.display = 'none';
        document.getElementById('player-box').style.display = 'block';
        document.getElementById('player-box').innerHTML = "⏳ SUMMONING STREAM...";

        // SEARCH STRATEGY: 
        // We query a public helper to find the best magnet link for the title.
        // For legal and stability reasons, you'd replace this with your chosen Torrent API.
        const magnetURI = `magnet:?xt=urn:btih:EXAMPLE_HASH&dn=${encodeURIComponent(title)}`;

        client.add(magnetURI, function (torrent) {
            const file = torrent.files.find(file => file.name.endsWith('.mp4'));
            file.appendTo('#player-box', { autoplay: true, muted: false });
            
            // Force Fullscreen & Unmute
            const video = document.querySelector('video');
            video.volume = 1.0;
            video.onplay = () => { video.requestFullscreen(); };
        });
    }

    function closeRitual() {
        document.getElementById('details-page').style.display = 'none';
        client.torrents.forEach(t => t.destroy());
    }
</script>
</body>
</html>
