<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fear+ | The Ritual</title>
    <script src="https://cdn.jsdelivr.net/npm/@webtor/embed-sdk-js/dist/index.min.js" charset="utf-8" async></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        :root { --blood: #8a0303; --void: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--void); color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        .skull-pulse { width: 80px; filter: invert(1) sepia(1) saturate(10000%) hue-rotate(0deg); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Banner */
        header {
            width: 100%; height: 75vh;
            background: linear-gradient(to bottom, transparent, var(--void)), url('IMG_8238.jpeg') no-repeat center center;
            background-size: cover; position: relative; border-bottom: 3px solid var(--blood);
        }
        .fear-title {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 60px; font-family: 'Creepster', cursive; color: var(--blood);
        }

        /* Nav */
        nav {
            background: rgba(0,0,0,0.95); padding: 15px; display: flex; 
            overflow-x: auto; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222;
        }
        .genre { margin-right: 25px; color: #888; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .genre:hover { color: var(--blood); }

        /* Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 1024px) { .movie-grid { grid-template-columns: repeat(6, 1fr); padding: 40px; } }
        .card { border: 1px solid #222; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--blood); transform: scale(1.05); }
        .card img { width: 100%; display: block; }

        /* IMMACULATE DETAILS PAGE */
        #details-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--void); z-index: 2000; display: none; overflow-y: auto;
        }
        .details-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.15); z-index: -1;
        }
        .altar { padding: 40px 20px; text-align: center; }
        
        /* Sexier Flyer View */
        .flyer-view {
            width: 300px; margin: 0 auto 30px; border-radius: 12px;
            box-shadow: 0 0 40px rgba(138, 3, 3, 0.6); border: 1px solid rgba(255,255,255,0.1);
            transform: perspective(1000px) rotateY(-5deg); transition: 0.5s;
        }
        .flyer-view:hover { transform: perspective(1000px) rotateY(0deg); }
        .flyer-view img { width: 100%; border-radius: 12px; display: block; }

        /* Skull Play Button */
        .skull-play-btn {
            width: 140px; margin: 20px auto; cursor: pointer;
            filter: drop-shadow(0 0 15px var(--blood)); transition: 0.4s;
        }
        .skull-play-btn:hover { transform: scale(1.15) rotate(10deg); filter: drop-shadow(0 0 25px red); }

        /* Immaculate Video Container */
        #player-container { width: 100%; max-width: 1100px; margin: 20px auto; display: none; border: 2px solid var(--blood); box-shadow: 0 0 50px black; }
        
        .meta-data h1 { font-family: 'Creepster'; font-size: 4rem; color: var(--blood); margin: 20px 0; text-shadow: 2px 2px 10px black; }
        .meta-data p { color: #bbb; font-size: 1.2rem; max-width: 700px; margin: 0 auto 40px; line-height: 1.6; }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="skull-pulse">
    <h2 style="color:var(--blood); font-family: 'Creepster'; font-size: 2rem;">ENTERING THE VOID...</h2>
</div>

<header><div class="fear-title">FEAR+</div></header>

<nav id="top-nav">
    <div class="genre" onclick="fetchHorrors('movie', 27)">Slasher</div>
    <div class="genre" onclick="fetchHorrors('movie', 9648)">Occult</div>
    <div class="genre" onclick="fetchHorrors('tv', 27)">Ritual Series</div>
    <div class="genre" onclick="fetchHorrors('movie', 53)">Psychological</div>
</nav>

<main id="main-content">
    <div class="movie-grid" id="ritual-grid"></div>
</main>

<div id="details-page">
    <div class="details-bg" id="det-bg"></div>
    <div class="altar">
        <button onclick="closeRitual()" style="background:rgba(0,0,0,0.6); border:1px solid var(--blood); color:var(--blood); padding:12px; width:100%; max-width:300px; cursor:pointer; margin-bottom:40px; font-weight:bold; letter-spacing:2px;">✕ CLOSE RITUAL</button>
        
        <div id="info-section">
            <div class="flyer-view">
                <img src="" id="det-flyer">
            </div>

            <div class="meta-data">
                <h1 id="det-title"></h1>
                <p id="det-desc"></p>
            </div>

            <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="skull-play-btn" onclick="startSacrifice()">
        </div>

        <div id="player-container"></div>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    let selectedMovie = null;

    window.onload = () => {
        fetchHorrors('movie', 27);
        setTimeout(() => document.getElementById('loader').style.display='none', 2000);
    };

    async function fetchHorrors(type, genreId) {
        const res = await fetch(`https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc`);
        const data = await res.json();
        const grid = document.getElementById('ritual-grid');
        grid.innerHTML = data.results.map(movie => `
            <div class="card" onclick='openDetails(${JSON.stringify(movie).replace(/'/g, "&apos;")})'>
                <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
            </div>
        `).join('');
    }

    function openDetails(movie) {
        selectedMovie = movie;
        document.getElementById('details-page').style.display = 'block';
        document.getElementById('det-title').innerText = movie.title || movie.name;
        document.getElementById('det-desc').innerText = movie.overview;
        document.getElementById('det-flyer').src = "https://image.tmdb.org/t/p/w500" + movie.poster_path;
        document.getElementById('det-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
        
        // Reset view for new sacrifice
        document.getElementById('info-section').style.display = 'block';
        document.getElementById('player-container').style.display = 'none';
        document.getElementById('player-container').innerHTML = '';
    }

    function startSacrifice() {
        document.getElementById('info-section').style.display = 'none';
        const pContainer = document.getElementById('player-container');
        pContainer.style.display = 'block';

        // High-Quality Source Logic: Using Webtor for immaculate streaming
        // You'll replace the magnet below with your chosen source. 
        // For legal testing, this is a clean public domain source.
        const magnetURI = 'magnet:?xt=urn:btih:08ada5a7a6183aae1e09d831df6748d566095a10&dn=Sintel&tr=udp%3A%2F%2Fexplodie.org%3A6969';

        window.webtor = window.webtor || [];
        window.webtor.push({
            id: 'player-container',
            magnet: magnetURI,
            onLoaded: function(e) {
                console.log('Sacrifice Ready');
                // Webtor handles unmuting and fullscreen via its internal player settings
            },
        });
    }

    function closeRitual() {
        document.getElementById('details-page').style.display = 'none';
        document.getElementById('player-container').innerHTML = '';
    }
</script>
</body>
</html>
