<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fear+ | The Ritual</title>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        :root { --blood-red: #8a0303; --smoke: #1a1a1a; --void: #050505; }
        
        body { margin: 0; background: var(--void); color: white; font-family: 'Arial', sans-serif; overflow-x: hidden; }
        h1, h2 { font-family: 'Creepster', cursive; letter-spacing: 2px; }

        /* Pulsating Skull Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .skull { width: 100px; filter: invert(1) sepia(1) saturate(10000%) hue-rotate(0deg); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* Header Banner */
        header {
            width: 100%; height: 75vh;
            background: linear-gradient(to bottom, transparent, var(--void)), url('IMG_8238.jpeg') no-repeat center center;
            background-size: cover; position: relative; border-bottom: 3px solid var(--blood-red);
        }

        /* Bleeding Title Effect */
        .fear-title {
            position: absolute; bottom: 30px; left: 40px;
            font-size: clamp(60px, 10vw, 120px); font-family: 'Creepster', cursive;
            color: var(--blood-red); text-shadow: 0 0 20px black;
            background: linear-gradient(to bottom, var(--blood-red) 0%, #3a0000 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .fear-title::after {
            content: "FEAR+"; position: absolute; top: 0; left: 0; width: 100%; height: 0;
            -webkit-text-fill-color: #ff0000; border-bottom: 2px solid #ff0000;
            overflow: hidden; animation: bleed 6s infinite alternate ease-in-out; filter: blur(1px);
        }
        @keyframes bleed { 0% { height: 0%; } 100% { height: 100%; } }

        /* Navigation */
        nav.top-menu {
            background: rgba(0,0,0,0.9); padding: 15px 40px; display: flex; align-items: center; gap: 20px;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222;
        }
        .genre-link { cursor: pointer; color: #aaa; text-transform: uppercase; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .genre-link:hover { color: var(--blood-red); text-shadow: 0 0 10px red; }
        .search-box { margin-left: auto; background: transparent; color: white; border: none; border-bottom: 1px solid #444; padding: 5px; outline: none; transition: 0.5s; width: 180px; }
        .search-box:focus { border-bottom: 1px solid var(--blood-red); width: 300px; }

        /* Grid UI */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px 40px; }
        .card { position: relative; cursor: pointer; transition: 0.4s; background: #111; overflow: hidden; border: 1px solid #222; }
        .card:hover { transform: scale(1.05); border-color: var(--blood-red); box-shadow: 0 0 15px rgba(138, 3, 3, 0.4); }
        .card img { width: 100%; display: block; }
        .card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, black); opacity: 0.7; }

        /* Details Modal */
        #details-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 500; display: none; overflow-y: auto;
        }
        .altar-container { max-width: 1100px; margin: 50px auto; padding: 20px; position: relative; }
        #player-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid var(--blood-red); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        .ep-btn { padding: 10px 18px; border: 1px solid #333; background: #111; color: white; cursor: pointer; margin: 5px; transition: 0.3s; }
        .ep-btn:hover { background: var(--blood-red); }

        .smoke-overlay { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'); opacity: 0.1; z-index: 10; }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://img.icons8.com/ios-filled/100/8a0303/skull.png" class="skull">
    <h2 style="color:var(--blood-red); margin-top:20px;">SUMMONING THE DARKNESS...</h2>
</div>

<div class="smoke-overlay"></div>

<header>
    <div class="fear-title">FEAR+</div>
</header>

<nav class="top-menu">
    <div class="genre-link" onclick="fetchRitual('movie', 27)">Movies</div>
    <div class="genre-link" onclick="fetchRitual('tv', 27)">TV Shows</div>
    <div class="genre-link" onclick="fetchRitual('movie', 53)">Thriller</div>
    <div class="genre-link" onclick="fetchRitual('movie', 9648)">Mystery</div>
    <input type="text" class="search-box" id="search" placeholder="Search the void..." oninput="searchRitual()">
</nav>

<section id="continue-watching" style="display:none; padding: 20px 40px;">
    <h2 style="color: var(--blood-red); font-size: 1.5rem;">RESUME THE RITUAL</h2>
    <div class="movie-grid" id="continue-grid"></div>
    <hr style="border:0; border-top:1px solid #222; margin-top:30px;">
</section>

<main>
    <h2 style="padding-left: 40px; color: #555;">TRENDING SACRIFICES</h2>
    <div class="movie-grid" id="main-grid"></div>
</main>

<div id="details-page">
    <div class="altar-container">
        <button onclick="closeRitual()" style="color:white; background:none; border:1px solid red; padding:8px 20px; cursor:pointer; margin-bottom:15px;">✕ CLOSE RITUAL</button>
        <div id="player-box"></div>
        <h1 id="det-title" style="color:var(--blood-red); font-size: 3rem;"></h1>
        <p id="det-desc" style="color:#bbb; line-height:1.8; font-size: 1.1rem; max-width: 800px;"></p>
        <div id="tv-controls" style="display:none; margin-top:30px;">
            <h3 style="color:var(--blood-red)">SELECT EPISODE</h3>
            <div id="episodes" style="display:flex; flex-wrap:wrap;"></div>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'b9c746781e1e9b084c4cc4f0420156d4';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const client = new WebTorrent();

    window.onload = () => {
        setTimeout(() => document.getElementById('loader').style.display='none', 2000);
        fetchRitual('movie', 27);
        renderContinue();
    };

    async function fetchRitual(type, genreId) {
        const res = await fetch(`${BASE_URL}/discover/${type}?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc`);
        const data = await res.json();
        drawGrid(data.results, 'main-grid');
    }

    async function searchRitual() {
        const q = document.getElementById('search').value;
        if(q.length < 3) { if(q.length === 0) fetchRitual('movie', 27); return; }
        const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${q}`);
        const data = await res.json();
        drawGrid(data.results.filter(i => i.poster_path), 'main-grid');
    }

    function drawGrid(items, gridId) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = items.map(item => `
            <div class="card" onclick='openRitual(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                <div style="padding:10px; font-size:11px; text-transform:uppercase; letter-spacing:1px;">${item.title || item.name}</div>
            </div>
        `).join('');
    }

    function openRitual(item) {
        document.getElementById('details-page').style.display = 'block';
        document.getElementById('det-title').innerText = item.title || item.name;
        document.getElementById('det-desc').innerText = item.overview;
        
        // Save to Memory
        let history = JSON.parse(localStorage.getItem('fear_history')) || [];
        history = history.filter(h => h.id !== item.id);
        history.unshift(item);
        localStorage.setItem('fear_history', JSON.stringify(history.slice(0,6)));
        renderContinue();

        // Player UI
        document.getElementById('player-box').innerHTML = '<h2 style="color:var(--blood-red); text-shadow:0 0 10px red;">THE SACRIFICE IS LOADING...</h2>';
        
        if(item.first_air_date) {
            document.getElementById('tv-controls').style.display = 'block';
            let eps = '';
            for(let i=1; i<=12; i++) eps += `<button class="ep-btn">EPISODE ${i}</button>`;
            document.getElementById('episodes').innerHTML = eps;
        } else {
            document.getElementById('tv-controls').style.display = 'none';
        }
    }

    function renderContinue() {
        const history = JSON.parse(localStorage.getItem('fear_history')) || [];
        if(history.length > 0) {
            document.getElementById('continue-watching').style.display = 'block';
            drawGrid(history, 'continue-grid');
        }
    }

    function closeRitual() {
        document.getElementById('details-page').style.display = 'none';
        document.getElementById('player-box').innerHTML = '';
    }
</script>
</body>
</html>
