<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BedtimeStoryZoneHD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --red: #E50914; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; touch-action: pan-y; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #loader { position: fixed; inset: 0; background: var(--black); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .loader-medusa { width: 120px; height: 120px; border-radius: 50%; background: url('IMG_8035.jpeg'); background-size: cover; border: 3px solid var(--gold); box-shadow: 0 0 40px var(--red); animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        #side-menu { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: #000; border-right: 1px solid var(--gold); z-index: 3000; transform: translateX(-100%); transition: 0.4s ease; box-shadow: 20px 0 50px rgba(0,0,0,0.9); }
        .menu-open { transform: translateX(0) !important; }

        .hero-banner { height: 50vh; position: relative; background: linear-gradient(to bottom, transparent, var(--black)), url('IMG_8035.jpeg'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20px; }
        .zonhd-logo { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 10vw, 4.5rem); color: var(--gold); text-shadow: 0 0 25px var(--red); font-style: italic; text-align: center; line-height: 0.9; }

        .movie-card { aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 3px solid transparent; position: relative; }
        .focusable:focus { outline: none; border-color: var(--red) !important; transform: scale(1.08); box-shadow: 0 0 25px rgba(229, 9, 20, 0.6); z-index: 50; }

        #selector-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; overflow-y: auto; }
        #details-backdrop { position: absolute; top: 0; width: 100%; height: 100%; opacity: 0.4; background-size: cover; background-position: center; filter: blur(30px); pointer-events: none; }
        
        .rating-badge { border: 1.5px solid var(--gold); color: var(--gold); padding: 1px 6px; border-radius: 4px; font-weight: 800; font-size: 13px; }
        .btn-play-red { background: linear-gradient(45deg, #4b0000, #ff0000); color: white; font-weight: 700; padding: 14px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; max-width: 400px; margin: 15px 0; border: 2px solid var(--gold); }
        
        .episode-row { display: flex; gap: 15px; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; border: 3px solid transparent; border-radius: 8px; }
        .ep-thumbnail { width: 120px; aspect-ratio: 16/9; background-size: cover; border-radius: 4px; flex-shrink: 0; position: relative; background-color: #111; }

        #player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        .active-filter { color: var(--gold) !important; border-bottom: 2px solid var(--gold); }
    </style>
</head>
<body>
    <div id="loader"><div class="loader-medusa"></div><p class="text-red-600 mt-6 tracking-[0.5em] font-black uppercase text-xs">Accessing Forbidden Archive...</p></div>

    <div id="side-menu" class="p-8 no-scrollbar overflow-y-auto">
        <h2 class="text-red-600 font-black mb-6 italic border-b border-red-900 pb-2 uppercase text-sm">Phobia Vault</h2>
        <div class="flex flex-col gap-5 text-zinc-500 font-bold uppercase text-[10px] tracking-widest mb-10">
            <button class="focusable text-left hover:text-white" onclick="setFilter('keyword', '236633')">Thalassophobia (Ocean)</button>
            <button class="focusable text-left hover:text-white" onclick="setFilter('keyword', '283045')">Megalophobia (Giants)</button>
            <button class="focusable text-left hover:text-white" onclick="setFilter('keyword', '195661')">Cleithrophobia (Trapped)</button>
            <button class="focusable text-left hover:text-white" onclick="setFilter('keyword', '264562')">Chronophobia (Time)</button>
        </div>
        <h2 class="text-gold font-black mb-6 italic border-b border-zinc-800 pb-2 uppercase text-sm">The Necronomicon</h2>
        <div class="flex flex-col gap-5 text-zinc-400 font-bold uppercase text-[10px] tracking-widest">
            <button class="focusable text-left" onclick="setFilter('keyword', '12339')">Slasher</button>
            <button class="focusable text-left" onclick="setFilter('keyword', '6152')">Supernatural</button>
            <button class="focusable text-left" onclick="setFilter('keyword', '15250')">Found Footage</button>
            <button class="focusable text-left" onclick="setFilter('keyword', '12432')">Body Horror</button>
            <button class="focusable text-left" onclick="setFilter('keyword', '12377')">Zombie</button>
        </div>
    </div>

    <header class="hero-banner">
        <h1 class="zonhd-logo">BEDTIME STORY<br>ZONE HD</h1>
    </header>

    <div class="sticky top-0 z-[1000] bg-black/95 border-b border-zinc-900">
        <input type="text" id="search-input" class="focusable w-[90%] mx-auto block bg-white/5 border border-red-900/30 rounded-full py-2 px-6 my-4 text-white outline-none" placeholder="Search the void..." onkeyup="handleSearch(event)">
        <nav id="nav-main" class="flex p-4 gap-8 overflow-x-auto no-scrollbar items-center px-6 text-[10px] font-black tracking-widest uppercase">
            <button id="menu-btn" onclick="toggleMenu()" class="focusable text-gold text-2xl pr-2">☰</button>
            <button id="btn-trending" onclick="setFilter('trending')" class="focusable active-filter whitespace-nowrap">Trending</button>
            <button class="focusable whitespace-nowrap" onclick="setFilter('keyword', '11025')">Dark Animation</button>
            <button class="focusable whitespace-nowrap" onclick="setFilter('keyword', '210350')">Psychological</button>
            <button class="focusable whitespace-nowrap" onclick="setFilter('keyword', '155452')">Family Frights</button>
        </nav>
    </div>

    <section id="continue-section" class="hidden px-4 pt-6">
        <h3 class="text-red-600 font-bold uppercase tracking-widest text-[10px] mb-4">Relive the Trauma</h3>
        <div id="continue-grid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
    </section>

    <main id="movie-grid" class="p-4 grid grid-cols-2 md:grid-cols-5 gap-4"></main>
    <div id="load-more-trigger" class="h-20"></div>

    <div id="selector-overlay" class="no-scrollbar">
        <div id="details-backdrop"></div>
        <div class="relative z-10 p-6 pt-10 max-w-4xl mx-auto">
            <button id="close-sel-btn" onclick="closeSelector()" class="focusable mb-6 bg-black/50 p-2 rounded-full border border-white/10"><svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
            <div class="flex gap-5 mb-6">
                <img id="details-poster" class="w-32 rounded-lg shadow-2xl">
                <div class="flex flex-col justify-end">
                    <h2 id="show-title" class="text-3xl font-extrabold mb-2 tracking-tighter"></h2>
                    <div class="flex items-center gap-3">
                        <span id="show-year" class="text-zinc-400 text-sm font-bold"></span>
                        <span id="show-rating" class="rating-badge"></span>
                        <span class="text-red-600 font-black text-[10px] tracking-widest uppercase">Unrated</span>
                    </div>
                </div>
            </div>
            <div id="movie-action-area" class="hidden"><button id="play-movie-btn" onclick="startLuxeStream()" class="focusable btn-play-red">▶ ENTER THE NIGHTMARE</button></div>
            <div id="tv-action-area-top" class="hidden"><button id="main-tv-btn" onclick="playCurrentEpisode()" class="focusable btn-play-red">▶ BEGIN S1 E1</button></div>
            <p id="show-desc" class="text-zinc-400 text-sm leading-relaxed mb-8"></p>
            <div id="tv-action-area" class="hidden">
                <h3 class="text-lg font-bold mb-4 border-b border-zinc-800 pb-2">Chapters</h3>
                <div id="season-buttons" class="flex gap-3 overflow-x-auto no-scrollbar mb-6"></div>
                <div id="episode-grid" class="flex flex-col"></div>
            </div>
        </div>
    </div>

    <div id="player-overlay">
        <button id="close-player-btn" onclick="closePlayer()" class="focusable absolute top-6 left-6 z-[7000] bg-black/60 text-white px-4 py-2 rounded-full border border-red-900 font-bold text-xs">✕ ESCAPE</button>
        <iframe id="luxe-player" class="w-full h-full" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>
    </div>

    <script>
        let API_KEY = '', activeType = 'trending', activeID = '', currentMedia = {}, currentPage = 1, isFetching = false;

        async function fetchConfig() {
            const res = await fetch('/api/config');
            const data = await res.json();
            API_KEY = data.tmdb_key;
            renderContinueWatching();
            fetchContent(true);
        }

        async function fetchContent(reset = false) {
            if (isFetching || !API_KEY) return;
            if (reset) { currentPage = 1; document.getElementById('movie-grid').innerHTML = ''; }
            isFetching = true;

            let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27&page=${currentPage}&sort_by=popularity.desc`;
            if (activeType === 'trending') url = `https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}&page=${currentPage}`;
            if (activeType === 'keyword') url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_keywords=${activeID}&with_genres=27&page=${currentPage}`;
            if (activeType === 'search') url = `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${activeID}&page=${currentPage}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                const grid = document.getElementById('movie-grid');
                data.results.forEach(m => {
                    if (!m.poster_path) return;
                    const card = document.createElement('div');
                    card.className = "movie-card focusable"; card.tabIndex = 0;
                    card.onclick = () => openDetails(m.id, m.media_type || (m.first_air_date ? 'tv' : 'movie'));
                    card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover">`;
                    grid.appendChild(card);
                });
                currentPage++;
            } catch (e) { console.error(e); }
            isFetching = false;
        }

        const observer = new IntersectionObserver((entries) => { if (entries[0].isIntersecting) fetchContent(); }, { threshold: 0.1 });
        observer.observe(document.getElementById('load-more-trigger'));

        async function openDetails(id, type) {
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}`);
            const data = await res.json();
            currentMedia = { id, type, s: 1, e: 1, title: data.name || data.title, poster: data.poster_path };
            
            document.getElementById('show-title').innerText = currentMedia.title;
            document.getElementById('show-desc').innerText = data.overview;
            document.getElementById('show-year').innerText = (data.release_date || data.first_air_date || '').split('-')[0];
            document.getElementById('show-rating').innerText = `★ ${data.vote_average.toFixed(1)}`;
            document.getElementById('details-poster').src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
            document.getElementById('details-backdrop').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;
            
            document.getElementById('movie-action-area').classList.toggle('hidden', type !== 'movie');
            document.getElementById('tv-action-area-top').classList.toggle('hidden', type !== 'tv');
            document.getElementById('tv-action-area').classList.toggle('hidden', type !== 'tv');
            
            if (type === 'tv') renderSeasons(data);
            document.getElementById('selector-overlay').style.display = 'block';
            setTimeout(() => { ((type === 'movie') ? document.getElementById('play-movie-btn') : document.getElementById('main-tv-btn')).focus(); }, 300);
        }

        function renderSeasons(data) {
            const container = document.getElementById('season-buttons'); container.innerHTML = '';
            data.seasons.forEach(s => {
                if (s.season_number === 0) return;
                const btn = document.createElement('button');
                btn.className = "focusable px-4 py-2 bg-zinc-900 rounded-lg text-xs font-bold border border-white/5 whitespace-nowrap";
                btn.innerText = `Season ${s.season_number}`;
                btn.onclick = () => loadEpisodes(data.id, s.season_number);
                container.appendChild(btn);
            });
            if(container.firstChild) container.firstChild.click();
        }

        async function loadEpisodes(showId, seasonNum) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${showId}/season/${seasonNum}?api_key=${API_KEY}`);
            const data = await res.json();
            const grid = document.getElementById('episode-grid'); grid.innerHTML = '';
            data.episodes.forEach(e => {
                const epRow = document.createElement('div'); epRow.className = "episode-row focusable"; epRow.tabIndex = 0;
                epRow.onclick = () => { currentMedia.s = seasonNum; currentMedia.e = e.episode_number; startLuxeStream(); };
                const thumb = e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : '';
                epRow.innerHTML = `<div class="ep-thumbnail" style="background-image:url(${thumb})"><div class="absolute inset-0 flex items-center justify-center bg-black/20">▶</div></div><div class="flex-1"><div class="text-white font-bold text-sm">E${e.episode_number} ${e.name}</div><div class="text-zinc-500 text-xs line-clamp-2 mt-1">${e.overview}</div></div>`;
                grid.appendChild(epRow);
            });
        }

        function playCurrentEpisode() { currentMedia.e = 1; startLuxeStream(); }

        function startLuxeStream() {
            const { type, id, s, e, title, poster } = currentMedia;
            saveToHistory(id, type, s, e, title, poster); 
            const iframe = document.getElementById('luxe-player');
            iframe.src = type === 'movie' ? `https://vidsrc.cc/v2/embed/movie/${id}` : `https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}`;
            document.getElementById('player-overlay').style.display = 'block';
            setTimeout(() => document.getElementById('close-player-btn').focus(), 500);
        }

        function saveToHistory(id, type, s, e, title, poster) {
            let history = JSON.parse(localStorage.getItem('zonhd_history') || '[]');
            history = history.filter(item => item.id !== id);
            history.unshift({ id, type, s, e, title, poster });
            localStorage.setItem('zonhd_history', JSON.stringify(history.slice(0, 10)));
            renderContinueWatching();
        }

        function renderContinueWatching() {
            const history = JSON.parse(localStorage.getItem('zonhd_history') || '[]');
            const section = document.getElementById('continue-section');
            const grid = document.getElementById('continue-grid');
            if (history.length === 0) { section.classList.add('hidden'); return; }
            section.classList.remove('hidden'); grid.innerHTML = '';
            history.forEach(item => {
                const card = document.createElement('div'); card.className = "min-w-[110px] max-w-[110px] cursor-pointer focusable movie-card"; card.tabIndex = 0;
                card.onclick = () => openDetails(item.id, item.type);
                card.innerHTML = `<div class="aspect-[2/3] rounded-lg overflow-hidden border border-white/10 mb-2"><img src="https://image.tmdb.org/t/p/w300${item.poster}" class="w-full h-full object-cover"></div><p class="text-[8px] text-red-600 font-black uppercase tracking-tighter">${item.type === 'tv' ? `S${item.s} E${item.e}` : 'MOVIE'}</p>`;
                grid.appendChild(card);
            });
        }

        function closeSelector() { document.getElementById('selector-overlay').style.display = 'none'; document.getElementById('btn-trending').focus(); }
        function closePlayer() { document.getElementById('luxe-player').src = ""; document.getElementById('player-overlay').style.display = 'none'; document.getElementById('close-sel-btn').focus(); }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('menu-open'); }

        function setFilter(type, id = '') { 
            activeType = type; activeID = id; 
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-filter'));
            fetchContent(true); 
            document.getElementById('side-menu').classList.remove('menu-open');
            window.scrollTo(0,0);
        }

        function handleSearch(e) { if (e.key === 'Enter') setFilter('search', e.target.value); }

        window.onload = () => { 
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').remove(), 500); }, 1000);
            fetchConfig();
            new Hammer(document.body).on("swiperight", () => toggleMenu());
        };

        document.addEventListener('keydown', function(e) {
            const current = document.activeElement;
            const focusables = Array.from(document.querySelectorAll('.focusable')).filter(el => el.offsetParent !== null);
            if (e.key === 'Backspace' || e.keyCode === 8) {
                if (document.getElementById('player-overlay').style.display === 'block') closePlayer();
                else if (document.getElementById('selector-overlay').style.display === 'block') closeSelector();
                else if (document.getElementById('side-menu').classList.contains('menu-open')) toggleMenu();
            }
            if (e.key === 'Enter') { if (current && current.classList.contains('focusable')) current.click(); }
            let dir = e.key.replace('Arrow','').toLowerCase();
            if (['up','down','left','right'].includes(dir)) {
                e.preventDefault();
                const next = findNext(current, focusables, dir);
                if (next) { next.focus(); next.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            }
        });

        function findNext(cur, targets, dir) {
            const r1 = cur.getBoundingClientRect(); const c1 = { x: r1.left + r1.width / 2, y: r1.top + r1.height / 2 };
            let best = null, min = Infinity;
            targets.forEach(t => {
                if (t === cur) return;
                const r2 = t.getBoundingClientRect(); const c2 = { x: r2.left + r2.width / 2, y: r2.top + r2.height / 2 };
                if (dir === 'up' && c2.y >= c1.y) return; if (dir === 'down' && c2.y <= c1.y) return;
                if (dir === 'left' && c2.x >= c1.x) return; if (dir === 'right' && c2.x <= c1.x) return;
                const d = Math.sqrt(Math.pow(c2.x - c1.x, 2) + Math.pow(c2.y - c1.y, 2));
                if (d < min) { min = d; best = t; }
            });
            return best;
        }
    </script>
</body>
</html>
