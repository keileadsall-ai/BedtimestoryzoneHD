<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Killermov HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --red: #E50914; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; touch-action: pan-y; }
        
        #loader { position: fixed; inset: 0; background: var(--black); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .loader-medusa { width: 120px; height: 120px; border-radius: 50%; background: url('IMG_8035.jpeg'); background-size: cover; border: 3px solid var(--red); box-shadow: 0 0 40px var(--red); animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        #side-menu { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: #000; border-right: 1px solid var(--red); z-index: 3000; transform: translateX(-100%); transition: 0.4s ease; }
        .menu-open { transform: translateX(0) !important; }

        .hero-banner { height: 50vh; position: relative; background: linear-gradient(to bottom, transparent, var(--black)), url('IMG_8035.jpeg'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20px; }
        .zonhd-logo { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 4rem); color: var(--red); text-shadow: 0 0 20px black; font-style: italic; font-weight: 900; }
        .movie-card { aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 3px solid transparent; }
        
        .focusable:focus {
            outline: none;
            border-color: var(--red) !important;
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.6);
            z-index: 50;
        }

        #selector-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; overflow-y: auto; }
        #details-backdrop { position: absolute; top: 0; width: 100%; height: 100%; opacity: 0.4; background-size: cover; background-position: center; filter: blur(30px); pointer-events: none; }
        
        .rating-badge { border: 1.5px solid var(--red); color: var(--red); padding: 1px 6px; border-radius: 4px; font-weight: 800; font-size: 13px; }
        .tv-tag { background: #331a1a; color: #ff4d4d; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 800; }
        
        .btn-play-red { background: var(--red); color: white; font-weight: 700; padding: 14px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; max-width: 400px; margin: 15px 0; border: 3px solid transparent; }
        
        .episode-row { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer; border: 3px solid transparent; }
        .ep-thumbnail { width: 120px; aspect-ratio: 16/9; background-size: cover; border-radius: 4px; flex-shrink: 0; position: relative; }
        .ep-play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); }

        #player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-filter { color: var(--red) !important; border-bottom: 2px solid var(--red); }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-medusa"></div>
        <p class="text-red-600 mt-6 tracking-[0.5em] font-bold uppercase">Killermov HD</p>
    </div>

    <div id="side-menu" class="p-8 no-scrollbar overflow-y-auto">
        <h2 class="text-red-600 font-bold mb-8 italic border-b border-red-900 pb-2 uppercase tracking-tighter">Fear Networks</h2>
        <div id="nav-networks" class="flex flex-col gap-6 text-zinc-400 font-bold uppercase text-xs tracking-widest">
            <button class="focusable text-left" onclick="setFilter('network', 77)">SyFy</button>
            <button class="focusable text-left" onclick="setFilter('network', 49)">HBO</button>
            <button class="focusable text-left" onclick="setFilter('network', 174)">AMC</button>
            <button class="focusable text-left" onclick="setFilter('network', 213)">Netflix Originals</button>
            <button class="focusable text-left" onclick="setFilter('network', 1024)">Prime Horror</button>
            <button class="focusable text-left" onclick="setFilter('network', 2739)">Disney+ (Dark)</button>
        </div>
    </div>

    <header class="hero-banner">
        <h1 class="zonhd-logo">Killermov HD</h1>
        <p class="text-red-600 tracking-[0.8em] text-[10px] font-bold uppercase">The Home of Horror</p>
    </header>

    <div class="sticky top-0 z-[1000] bg-black/95 border-b border-zinc-900">
        <input type="text" id="search-input" class="focusable w-[90%] mx-auto block bg-white/5 border border-red-600/20 rounded-full py-2 px-6 my-4 text-white outline-none" placeholder="Search the Morgue..." onkeyup="handleSearch(event)">
        
        <nav id="nav-main" class="flex p-4 gap-8 overflow-x-auto no-scrollbar items-center justify-start px-6 text-[10px] font-bold tracking-widest uppercase">
            <button id="menu-btn" onclick="toggleMenu()" class="focusable text-red-600 text-2xl pr-2">☰</button>
            <button id="btn-trending" onclick="setFilter('trending')" class="focusable active-filter whitespace-nowrap">Latest Bloodshed</button>
            
            <button class="focusable whitespace-nowrap" onclick="setFilter('genre', 27)">All Horror</button>
            <button class="focusable whitespace-nowrap" onclick="setFilter('genre', 53)">Thriller</button>
            <button class="focusable whitespace-nowrap" onclick="setFilter('genre', 9648)">Mystery</button>
            <button class="focusable whitespace-nowrap" onclick="setFilter('genre', 878)">Sci-Fi Horror</button>
        </nav>
    </div>

    <section id="continue-section" class="hidden px-4 pt-6">
        <h3 class="text-red-600 font-bold uppercase tracking-widest text-xs mb-4">Pick Up Where You Screamed</h3>
        <div id="continue-grid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
    </section>

    <main id="movie-grid" class="p-4 grid grid-cols-2 md:grid-cols-5 gap-4"></main>

    <div id="selector-overlay" class="no-scrollbar">
        <div id="details-backdrop"></div>
        <div class="relative z-10 p-6 pt-10 max-w-4xl mx-auto">
            <button id="close-sel-btn" onclick="closeSelector()" class="focusable mb-6 bg-black/50 p-2 rounded-full border border-white/10">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div class="flex gap-5 mb-6">
                <img id="details-poster" class="w-32 rounded-lg shadow-2xl">
                <div class="flex flex-col justify-end">
                    <h2 id="show-title" class="text-3xl font-extrabold mb-2 tracking-tighter"></h2>
                    <div class="flex items-center gap-3">
                        <span id="show-year" class="text-zinc-400 text-sm font-bold"></span>
                        <span id="show-rating" class="rating-badge"></span>
                        <span class="tv-tag">RATED</span>
                    </div>
                </div>
            </div>
            <div id="movie-action-area" class="hidden"><button id="play-movie-btn" onclick="startLuxeStream()" class="focusable btn-play-red">▶ Watch Now</button></div>
            <div id="tv-action-area-top" class="hidden"><button id="main-tv-btn" onclick="playCurrentEpisode()" class="focusable btn-play-red">▶ Watch S1 E1</button></div>
            <p id="show-desc" class="text-zinc-400 text-sm leading-relaxed mb-8"></p>
            <div id="tv-action-area" class="hidden">
                <h3 class="text-lg font-bold mb-4 border-b border-zinc-800 pb-2">Episodes</h3>
                <div id="season-buttons" class="flex gap-3 overflow-x-auto no-scrollbar mb-6"></div>
                <div id="episode-grid" class="flex flex-col"></div>
            </div>
        </div>
    </div>

    <div id="player-overlay">
        <button id="close-player-btn" onclick="closePlayer()" class="focusable absolute top-6 left-6 z-[7000] bg-black/60 text-white px-4 py-2 rounded-full border border-white/20 font-bold text-xs">✕ STOP THE TERROR</button>
        <iframe id="luxe-player" class="w-full h-full" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>
    </div>

    <script>
        /* SCRIPT REMAINS 100% FUNCTIONALLY THE SAME AS YOUR WORKING VERSION */
        /* ONLY THE LOCALSTORAGE KEY WAS UPDATED TO PREVENT MIXING HISTORIES */
        let API_KEY = '', activeType = 'trending', activeID = '', currentMedia = {};

        async function fetchConfig() {
            const res = await fetch('/api/config');
            const data = await res.json();
            API_KEY = data.tmdb_key;
            renderContinueWatching();
            fetchContent();
        }

        async function fetchContent() {
            let url = `https://api.themoviedb.org/3/trending/all/day?api_key=${API_KEY}`;
            // Logic to ensure horror-only is trickier, but by keeping IDs it works with your genres
            if (activeType === 'genre') url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${activeID}`;
            if (activeType === 'network') url = `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_networks=${activeID}`;
            if (activeType === 'search') url = `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${activeID}`;
            
            const res = await fetch(url);
            const data = await res.json();
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            data.results.forEach(m => {
                if (!m.poster_path) return;
                const card = document.createElement('div');
                card.className = "movie-card focusable";
                card.tabIndex = 0;
                card.onclick = () => openDetails(m.id, m.media_type || (m.first_air_date ? 'tv' : 'movie'));
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover">`;
                grid.appendChild(card);
            });
        }

        async function openDetails(id, type) {
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}`);
            const data = await res.json();
            currentMedia = { id, type, s: 1, e: 1, title: data.name || data.title, poster: data.poster_path };
            
            document.getElementById('show-title').innerText = currentMedia.title;
            document.getElementById('show-desc').innerText = data.overview;
            document.getElementById('show-year').innerText = (data.release_date || data.first_air_date || '').split('-')[0];
            document.getElementById('show-rating').innerText = `★ ${data.vote_average.toFixed(1)}`;
            document.getElementById('details-poster').src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
            document.getElementById('details-backdrop').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.backdrop_path})`;
            
            document.getElementById('movie-action-area').classList.toggle('hidden', type !== 'movie');
            document.getElementById('tv-action-area-top').classList.toggle('hidden', type !== 'tv');
            document.getElementById('tv-action-area').classList.toggle('hidden', type !== 'tv');
            
            if (type === 'tv') renderSeasons(data);
            document.getElementById('selector-overlay').style.display = 'block';

            setTimeout(() => {
                const playBtn = (type === 'movie') ? document.getElementById('play-movie-btn') : document.getElementById('main-tv-btn');
                if(playBtn) playBtn.focus();
            }, 300);
        }

        function renderSeasons(data) {
            const container = document.getElementById('season-buttons');
            container.innerHTML = '';
            data.seasons.forEach(s => {
                if (s.season_number === 0) return;
                const btn = document.createElement('button');
                btn.className = "focusable px-4 py-2 bg-zinc-900 rounded-lg text-xs font-bold border border-white/5 whitespace-nowrap";
                btn.innerText = `Season ${s.season_number}`;
                btn.tabIndex = 0;
                btn.onclick = () => loadEpisodes(data.id, s.season_number);
                container.appendChild(btn);
            });
            if(container.firstChild) container.firstChild.click();
        }

        async function loadEpisodes(showId, seasonNum) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${showId}/season/${seasonNum}?api_key=${API_KEY}`);
            const data = await res.json();
            const grid = document.getElementById('episode-grid');
            grid.innerHTML = '';
            data.episodes.forEach(e => {
                const epRow = document.createElement('div');
                epRow.className = "episode-row focusable";
                epRow.tabIndex = 0;
                epRow.onclick = () => { currentMedia.s = seasonNum; currentMedia.e = e.episode_number; startLuxeStream(); };
                const thumb = e.still_path ? `https://image.tmdb.org/t/p/w300${e.still_path}` : '';
                epRow.innerHTML = `<div class="ep-thumbnail" style="background-image:url(${thumb})"><div class="ep-play-btn">▶</div></div><div class="flex-1"><div class="text-white font-bold text-sm">E${e.episode_number} ${e.name}</div><div class="text-zinc-500 text-xs line-clamp-2 mt-1">${e.overview}</div></div>`;
                grid.appendChild(epRow);
            });
            document.getElementById('main-tv-btn').innerText = `▶ Play S${seasonNum} E1`;
        }

        function playCurrentEpisode() { currentMedia.e = 1; startLuxeStream(); }

        function startLuxeStream() {
            const { type, id, s, e, title, poster } = currentMedia;
            saveToHistory(id, type, s, e, title, poster); 
            const iframe = document.getElementById('luxe-player');
            iframe.src = type === 'movie' ? `https://vidsrc.cc/v2/embed/movie/${id}` : `https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}`;
            document.getElementById('player-overlay').style.display = 'block';
            setTimeout(() => document.getElementById('close-player-btn').focus(), 500);
        }

        function saveToHistory(id, type, s, e, title, poster) {
            let history = JSON.parse(localStorage.getItem('killermov_history') || '[]');
            history = history.filter(item => item.id !== id);
            history.unshift({ id, type, s, e, title, poster });
            localStorage.setItem('killermov_history', JSON.stringify(history.slice(0, 10)));
            renderContinueWatching();
        }

        function renderContinueWatching() {
            const history = JSON.parse(localStorage.getItem('killermov_history') || '[]');
            const section = document.getElementById('continue-section');
            const grid = document.getElementById('continue-grid');
            if (history.length === 0) { section.classList.add('hidden'); return; }
            section.classList.remove('hidden');
            grid.innerHTML = '';
            history.forEach(item => {
                const card = document.createElement('div');
                card.className = "min-w-[120px] max-w-[120px] cursor-pointer focusable movie-card";
                card.tabIndex = 0;
                card.onclick = () => openDetails(item.id, item.type);
                card.innerHTML = `
                    <div class="aspect-[2/3] rounded-lg overflow-hidden border border-white/10 mb-2">
                        <img src="https://image.tmdb.org/t/p/w300${item.poster}" class="w-full h-full object-cover">
                    </div>
                    <p class="text-[10px] font-bold truncate text-zinc-400 uppercase tracking-tighter">${item.title}</p>
                    <p class="text-[8px] text-red-600 font-bold">${item.type === 'tv' ? `S${item.s} E${item.e}` : 'MOVIE'}</p>
                `;
                grid.appendChild(card);
            });
        }

        function closeSelector() { document.getElementById('selector-overlay').style.display = 'none'; document.getElementById('btn-trending').focus(); }
        function closePlayer() { document.getElementById('luxe-player').src = ""; document.getElementById('player-overlay').style.display = 'none'; document.getElementById('close-sel-btn').focus(); }
        
        function toggleMenu() { 
            const menu = document.getElementById('side-menu');
            menu.classList.toggle('menu-open'); 
            if(menu.classList.contains('menu-open')) {
                setTimeout(() => {
                    const firstNet = document.querySelector('#nav-networks .focusable');
                    if(firstNet) firstNet.focus();
                }, 300);
            }
        }

        function setFilter(type, id = '') { 
            activeType = type; activeID = id; 
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-filter'));
            fetchContent(); 
            document.getElementById('side-menu').classList.remove('menu-open');
            window.scrollTo(0,0);
            document.getElementById('btn-trending').focus();
        }

        function handleSearch(e) { if (e.key === 'Enter') setFilter('search', e.target.value); }

        window.onload = () => { 
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').remove(), 500); }, 1000);
            fetchConfig();
            const mc = new Hammer(document.body);
            mc.on("swiperight", () => toggleMenu());
        };

        // --- REMOTE CONTROL ENGINE ---
        document.addEventListener('keydown', function(e) {
            const current = document.activeElement;
            const focusables = Array.from(document.querySelectorAll('.focusable')).filter(el => el.offsetParent !== null);
            
            if (e.key === 'ContextMenu' || e.keyCode === 224 || e.keyCode === 462) {
                e.preventDefault();
                toggleMenu();
                return;
            }

            if (e.key === 'Backspace' || e.keyCode === 8 || e.keyCode === 10009) {
                e.preventDefault();
                if (document.getElementById('player-overlay').style.display === 'block') closePlayer();
                else if (document.getElementById('selector-overlay').style.display === 'block') closeSelector();
                else if (document.getElementById('side-menu').classList.contains('menu-open')) toggleMenu();
                return;
            }

            if (e.key === 'Enter' || e.keyCode === 13) {
                if (current && current.classList.contains('focusable')) current.click();
                return;
            }

            let dir = '';
            if (e.key === 'ArrowUp') dir = 'up';
            if (e.key === 'ArrowDown') dir = 'down';
            if (e.key === 'ArrowLeft') dir = 'left';
            if (e.key === 'ArrowRight') dir = 'right';

            if (dir) {
                e.preventDefault();
                const next = findNext(current, focusables, dir);
                if (next) {
                    next.focus();
                    next.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                }
            }
        });

        function findNext(cur, targets, dir) {
            if (!cur || cur === document.body) return targets[0];
            const r1 = cur.getBoundingClientRect();
            const c1 = { x: r1.left + r1.width / 2, y: r1.top + r1.height / 2 };
            let best = null, min = Infinity;

            targets.forEach(t => {
                if (t === cur) return;
                const r2 = t.getBoundingClientRect();
                const c2 = { x: r2.left + r2.width / 2, y: r2.top + r2.height / 2 };
                if (dir === 'up' && c2.y >= c1.y) return;
                if (dir === 'down' && c2.y <= c1.y) return;
                if (dir === 'left' && c2.x >= c1.x) return;
                if (dir === 'right' && c2.x <= c1.x) return;
                const d = Math.sqrt(Math.pow(c2.x - c1.x, 2) + Math.pow(c2.y - c1.y, 2));
                if (d < min) { min = d; best = t; }
            });
            return best;
        }
    </script>
</body>
</html>
